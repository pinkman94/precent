<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동작 프리센트 신축공사 현장관리</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-down { animation: fadeInDown 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        const getLocalYMD = (dateObj = new Date()) => {
            const offset = dateObj.getTimezoneOffset() * 60000;
            const localDate = new Date(dateObj.getTime() - offset);
            return localDate.toISOString().split('T')[0];
        };

        const TabDescription = ({ text }) => (
            <div className="bg-blue-50 border border-blue-100 p-4 rounded-2xl mb-6 shadow-sm flex items-start gap-3 animate-fade-in">
                <i className="fa-solid fa-circle-info text-blue-500 mt-0.5"></i>
                <p className="text-sm font-bold text-blue-800 leading-snug">{text}</p>
            </div>
        );

        const firebaseConfig = {
            apiKey: "AIzaSyDw6rUaE7mxMrywGjAMAtv0Z4vGqg8K8m8",
            authDomain: "precentacednc.firebaseapp.com",
            projectId: "precentacednc",
            storageBucket: "precentacednc.firebasestorage.app",
            messagingSenderId: "752941894819",
            appId: "1:752941894819:web:a4ca81c7d44107affb8316"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'construction-app';

        // ==========================================
        // 컴포넌트: 홈 대시보드
        // ==========================================
        const DashboardTab = ({ stats, realWeather, tasks, requests, todayDateString, formatMd, todayDate, tomorrowDate, setActiveTab }) => (
            <div className="space-y-6 animate-fade-in">
                <TabDescription text="[종합 상황판] 현장의 당일 출역 현황, 기상 정보, 주요 작업 및 최신 소통 내역을 한눈에 파악할 수 있는 메인 대시보드입니다." />
                
                <div className="flex justify-between items-end">
                    <h2 className="text-xl font-bold text-slate-800">현장 종합 현황</h2>
                    <span className="text-sm font-medium text-slate-500">{todayDateString}</span>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div className="bg-blue-600 text-white rounded-2xl p-6 shadow-lg relative overflow-hidden">
                        <div className="z-10 relative">
                            <p className="text-blue-100 text-sm font-medium">금일 실시간 잔류 인원</p>
                            <div className="flex items-end gap-2 mt-2">
                                <span className="text-5xl font-bold">{stats.currentWorking}</span>
                                <span className="text-blue-100 mb-1">/ {stats.totalAssigned}명</span>
                            </div>
                        </div>
                        <i className="fa-solid fa-helmet-safety absolute right-[-10px] bottom-[-10px] text-9xl text-blue-500 opacity-40"></i>
                    </div>
                    <div className="bg-white rounded-2xl p-6 shadow border border-slate-100">
                        <p className="text-slate-500 text-sm font-medium mb-4">취약 근로자 현황</p>
                        <div className="grid grid-cols-2 gap-3 text-sm">
                            <div className="flex justify-between p-2 bg-slate-50 rounded-lg"><span className="text-slate-600">고령자</span><span className="font-bold text-rose-600">{stats.totalElderly}</span></div>
                            <div className="flex justify-between p-2 bg-slate-50 rounded-lg"><span className="text-slate-600">신규자</span><span className="font-bold text-orange-500">{stats.totalNew}</span></div>
                            <div className="flex justify-between p-2 bg-slate-50 rounded-lg"><span className="text-slate-600">외국인</span><span className="font-bold text-blue-600">{stats.totalForeigner}</span></div>
                            <div className="flex justify-between p-2 bg-slate-50 rounded-lg"><span className="text-slate-600">여성</span><span className="font-bold text-purple-600">{stats.totalFemale}</span></div>
                        </div>
                    </div>
                    <div className="bg-white rounded-2xl p-6 shadow border border-slate-100 md:col-span-2">
                        <div className="flex justify-between items-center mb-4">
                            <p className="text-slate-500 text-sm font-medium flex items-center gap-2">기상 정보 <span className="text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded border border-blue-100">기상청 연동 예정</span></p>
                            <p className="text-xs font-bold text-slate-600 bg-slate-100 px-3 py-1 rounded-full">📍 동작구 신대방동</p>
                        </div>
                        <div className="flex divide-x divide-slate-100">
                            <div className="flex-1 flex items-center gap-4 pr-4">
                                {realWeather.today.icon}
                                <div><p className="text-xs text-slate-500 font-semibold">오늘 ({formatMd(todayDate)})</p><p className="font-bold text-slate-800 text-lg">{realWeather.today.desc} <span className="text-sm font-normal text-slate-400 ml-1">{realWeather.today.temp}</span></p></div>
                            </div>
                            <div className="flex-1 flex items-center gap-4 pl-4">
                                {realWeather.tomorrow.icon}
                                <div><p className="text-xs text-slate-500 font-semibold">내일 ({formatMd(tomorrowDate)})</p><p className="font-bold text-slate-800 text-lg">{realWeather.tomorrow.desc} <span className="text-sm font-normal text-slate-400 ml-1">{realWeather.tomorrow.temp}</span></p></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="bg-white rounded-2xl shadow border border-slate-100 p-6">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-location-dot text-blue-600 text-lg"></i> 금일 주요 작업사항</h3>
                            <button onClick={() => setActiveTab('tasks')} className="text-sm text-blue-600 hover:underline">전체보기</button>
                        </div>
                        <div className="space-y-3">
                            {tasks.length === 0 ? <p className="text-sm text-slate-400 text-center py-4 bg-slate-50 rounded-xl">등록된 작업이 없습니다.</p> : tasks.slice(0, 3).map(task => (
                                <div key={task.id} className="p-4 border border-slate-100 rounded-xl hover:bg-slate-50 transition">
                                    <div className="flex justify-between items-start mb-2"><span className="bg-blue-100 text-blue-800 text-xs px-2.5 py-1 rounded-md font-bold">{task.trade}</span><span className="text-xs font-medium text-slate-500"><i className="fa-solid fa-location-dot mr-1"></i>{task.details[0]?.location} {task.details.length > 1 && ' 외'}</span></div>
                                    <p className="text-sm font-bold text-slate-800">{task.details[0]?.task} {task.details.length > 1 && <span className="text-blue-500 text-xs ml-1">(외 {task.details.length - 1}건)</span>}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="bg-white rounded-2xl shadow border border-slate-100 p-6">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-comment-dots text-emerald-600 text-lg"></i> 최근 요청/협의사항</h3>
                            <button onClick={() => setActiveTab('requests')} className="text-sm text-blue-600 hover:underline">전체보기</button>
                        </div>
                        <div className="space-y-3">
                            {requests.length === 0 ? <p className="text-sm text-slate-400 text-center py-4 bg-slate-50 rounded-xl">요청/협의 내용이 없습니다.</p> : requests.slice(0, 3).map(req => (
                                <div key={req.id} className="p-4 border border-slate-100 rounded-xl flex gap-3 hover:bg-slate-50 transition">
                                    <div className="mt-1 w-2 h-2 rounded-full bg-emerald-500 shrink-0"></div>
                                    <div className="flex-1"><div className="flex justify-between items-center mb-1"><span className="text-xs font-bold text-slate-600">{req.sender}</span><span className="text-xs font-medium text-slate-400">{req.time}</span></div><p className="text-sm text-slate-800 line-clamp-2">{req.content}</p></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        // ==========================================
        // 컴포넌트: 소통
        // ==========================================
        const CommunicationTab = ({ requests, loginRole, canDelete, isGuest, handleAddRequestToDB, deleteRequest }) => {
            const [newReq, setNewReq] = useState({ type: '요청', content: '' });
            const [img, setImg] = useState(null);
            const fileInputRef = useRef(null);

            const handleImg = (e) => {
                const f = e.target.files[0];
                if (f) {
                    const r = new FileReader();
                    r.onloadend = () => {
                        const imgObj = new Image();
                        imgObj.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = imgObj.width;
                            let height = imgObj.height;
                            const MAX_WIDTH = 800; // 자동 압축
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(imgObj, 0, 0, width, height);
                            setImg(canvas.toDataURL('image/jpeg', 0.6));
                        };
                        imgObj.src = r.result;
                    };
                    r.readAsDataURL(f);
                }
            };
            const onSubmit = (e) => {
                e.preventDefault();
                if(isGuest) return;
                if (!newReq.content.trim() && !img) return alert('내용 또는 사진을 입력하세요.');
                handleAddRequestToDB(newReq, img, loginRole);
                setNewReq({ type: '요청', content: '' }); setImg(null); if(fileInputRef.current) fileInputRef.current.value = "";
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <TabDescription text="[현장 소통] 현장 구성원 간 특이사항이나 현장 사진을 실시간으로 공유하고 협의하는 클라우드 소통 채널입니다." />
                    
                    <div className="bg-white rounded-3xl shadow-lg border border-slate-100 flex flex-col h-[700px] overflow-hidden">
                        <div className="p-6 border-b border-slate-100 bg-slate-800 text-white flex justify-between items-center">
                            <div><h2 className="font-bold text-lg">원청 ↔ 협력사 소통 보드</h2></div>
                            <i className="fa-solid fa-walkie-talkie text-3xl text-slate-600"></i>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50/50">
                            {requests.length === 0 ? <div className="h-full flex flex-col items-center justify-center text-slate-400 opacity-50"><i className="fa-regular fa-comments text-5xl mb-3"></i><p>공유된 대화가 없습니다.</p></div> : requests.map(r => {
                                const isMine = r.sender.includes('나');
                                return (
                                    <div key={r.id} className={`flex ${isMine ? 'justify-end' : 'justify-start'} group`}>
                                        <div className={`max-w-[85%] md:max-w-[65%] p-5 rounded-3xl shadow-md relative ${isMine ? 'bg-blue-600 text-white rounded-tr-sm' : 'bg-white border border-slate-200 rounded-tl-sm'}`}>
                                            <div className={`text-xs font-black mb-3 pb-2 border-b flex items-center gap-2 ${isMine ? 'border-blue-500/50 text-blue-200' : 'border-slate-100 text-slate-500'}`}><span className="uppercase tracking-widest bg-black/10 px-2 py-0.5 rounded-full text-[9px]">{r.type}</span> {r.sender.replace(' (나)', '')}</div>
                                            {r.image && <img src={r.image} className="max-h-72 rounded-xl mb-3 w-full object-cover border border-black/10 shadow-sm"/>}
                                            <p className="text-sm leading-relaxed whitespace-pre-wrap font-medium">{r.content}</p>
                                            <div className={`text-[10px] mt-3 text-right font-bold ${isMine ? 'text-blue-300' : 'text-slate-400'}`}>{r.time}</div>
                                            {canDelete && !isGuest && <button onClick={() => deleteRequest(r.id)} className={`absolute -top-3 ${isMine ? '-left-3' : '-right-3'} bg-white text-rose-500 rounded-full shadow-lg border border-slate-100 w-8 h-8 opacity-0 group-hover:opacity-100 transition flex items-center justify-center hover:bg-rose-500 hover:text-white`}><i className="fa-solid fa-trash-can text-[11px]"></i></button>}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                        {!isGuest && (
                            <form onSubmit={onSubmit} className="p-5 border-t border-slate-200 bg-white">
                                {img && (<div className="mb-3 relative inline-block animate-fade-in-down"><img src={img} className="h-24 w-auto rounded-xl border-2 border-blue-500 object-cover shadow-md"/><button type="button" onClick={()=>{setImg(null); if(fileInputRef.current) fileInputRef.current.value="";}} className="absolute -top-2 -right-2 bg-slate-800 text-white rounded-full w-6 h-6 flex items-center justify-center shadow-lg hover:bg-rose-500 transition"><i className="fa-solid fa-xmark text-xs"></i></button></div>)}
                                <div className="flex gap-3 items-end">
                                    <label className="cursor-pointer bg-slate-50 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-all p-4 rounded-2xl border border-slate-200 text-slate-500 shadow-sm flex items-center justify-center"><i className="fa-solid fa-camera text-xl"></i><input type="file" className="hidden" accept="image/*" onChange={handleImg} ref={fileInputRef}/></label>
                                    <div className="flex-1 bg-slate-50 border border-slate-200 rounded-2xl p-2 flex flex-col md:flex-row gap-2 shadow-sm focus-within:border-blue-400 focus-within:ring-2 focus-within:ring-blue-100 transition-all">
                                        <select className="p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 outline-none w-full md:w-32" value={newReq.type} onChange={e => setNewReq({...newReq, type: e.target.value})}><option>요청</option><option>협의</option><option>공지</option></select>
                                        <textarea className="flex-1 p-3 bg-transparent text-sm outline-none resize-none font-medium text-slate-800 placeholder-slate-400" placeholder="내용을 입력하세요 (사진 동기화 가능)" rows="2" value={newReq.content} onChange={e => setNewReq({...newReq, content: e.target.value})}></textarea>
                                    </div>
                                    <button className="bg-slate-800 hover:bg-black text-white h-full px-6 py-4 rounded-2xl font-bold shadow-lg shadow-slate-300 transition-all active:scale-95 flex flex-col items-center justify-center gap-1 shrink-0"><i className="fa-solid fa-paper-plane"></i><span className="text-[10px] tracking-widest uppercase">Send</span></button>
                                </div>
                            </form>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 컴포넌트: 출역일보 (Master Only)
        // ==========================================
        const DailyReportTab = ({ subcontractors, tasks, dailyReports, todayStr, handleSaveDailyReport, handleDeleteDailyReport, isGuest }) => {
            const [reportDateStr, setReportDateStr] = useState(todayStr);
            const [isEditing, setIsEditing] = useState(false);
            const [localData, setLocalData] = useState([]);

            const reportYesterday = new Date(reportDateStr);
            reportYesterday.setDate(reportYesterday.getDate() - 1);
            const reportYesterdayStr = getLocalYMD(reportYesterday);

            const formatTs = (ts) => {
                const d = new Date(ts);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            };

            useEffect(() => {
                if (isEditing) return;

                const savedReport = dailyReports.find(r => r.id === reportDateStr);
                if (savedReport) {
                    setLocalData(savedReport.entries);
                } else {
                    const cumulativeSubs = subcontractors.filter(s => (s.date || formatTs(s.createdAt)) <= reportDateStr);
                    const cumulativeTasks = tasks.filter(t => (t.date || formatTs(t.createdAt)) <= reportDateStr);
                    
                    const subKeys = cumulativeSubs.map(s => `${s.name}|${s.trade}`);
                    const taskKeys = cumulativeTasks.map(t => `${t.subName}|${t.trade}`);
                    const uniqueKeys = [...new Set([...subKeys, ...taskKeys])];

                    const generated = uniqueKeys.map((key, kIdx) => {
                        const [name, trade] = key.split('|');

                        const myTasks = cumulativeTasks.filter(t => t.subName === name && t.trade === trade);
                        
                        const todayTaskDocs = myTasks.filter(t => (t.date || formatTs(t.createdAt)) === reportDateStr);
                        const yesterdayTaskDocs = myTasks.filter(t => (t.date || formatTs(t.createdAt)) === reportYesterdayStr);

                        const todayTaskText = todayTaskDocs.flatMap(doc => doc.details.map(d => `[${d.location}] ${d.task}`)).join('\n');
                        const yesterdayTaskText = yesterdayTaskDocs.flatMap(doc => doc.details.map(d => `[${d.location}] ${d.task}`)).join('\n');

                        const mySubs = cumulativeSubs.filter(s => s.name === name && s.trade === trade);
                        const tradeMap = {};

                        mySubs.forEach(subDoc => {
                            const isToday = (subDoc.date || formatTs(subDoc.createdAt)) === reportDateStr;
                            const isYesterday = (subDoc.date || formatTs(subDoc.createdAt)) === reportYesterdayStr;
                            const totalDocWorkers = (subDoc.early||0) + (subDoc.day||0) + (subDoc.night||0);
                            
                            if (subDoc.workers && subDoc.workers.length > 0) {
                                subDoc.workers.forEach(w => {
                                    const tName = w.detailTrade || '미입력';
                                    if (!tradeMap[tName]) tradeMap[tName] = { yesterday: 0, today: 0, cumulative: 0 };
                                    tradeMap[tName].cumulative += 1;
                                    if (isToday) tradeMap[tName].today += 1;
                                    if (isYesterday) tradeMap[tName].yesterday += 1;
                                });
                                
                                const unaccounted = totalDocWorkers - subDoc.workers.length;
                                if (unaccounted > 0) {
                                    const mainTrade = trade || '기본공종';
                                    if (!tradeMap[mainTrade]) tradeMap[mainTrade] = { yesterday: 0, today: 0, cumulative: 0 };
                                    tradeMap[mainTrade].cumulative += unaccounted;
                                    if (isToday) tradeMap[mainTrade].today += unaccounted;
                                    if (isYesterday) tradeMap[mainTrade].yesterday += unaccounted;
                                }
                            } else {
                                const mainTrade = trade || '기본공종';
                                if (!tradeMap[mainTrade]) tradeMap[mainTrade] = { yesterday: 0, today: 0, cumulative: 0 };
                                tradeMap[mainTrade].cumulative += totalDocWorkers;
                                if (isToday) tradeMap[mainTrade].today += totalDocWorkers;
                                if (isYesterday) tradeMap[mainTrade].yesterday += totalDocWorkers;
                            }
                        });

                        const detailTrades = Object.keys(tradeMap).map((k, i) => ({ id: `dt_${kIdx}_${i}`, name: k, ...tradeMap[k] }));

                        return {
                            id: `entry_${kIdx}`,
                            subName: name,
                            trade: trade,
                            yesterdayTask: yesterdayTaskText,
                            todayTask: todayTaskText,
                            detailTrades: detailTrades.length > 0 ? detailTrades : [{ id: `dt_${kIdx}_empty`, name: '-', yesterday: 0, today: 0, cumulative: 0 }]
                        };
                    }).filter(entry => entry.detailTrades.some(dt => dt.cumulative > 0) || entry.todayTask !== '' || entry.yesterdayTask !== '');

                    setLocalData(generated);
                }
            }, [reportDateStr, dailyReports, subcontractors, tasks, isEditing, reportYesterdayStr]);

            const totalYesterday = localData.reduce((sum, e) => sum + e.detailTrades.reduce((s, dt) => s + (Number(dt.yesterday)||0), 0), 0);
            const totalToday = localData.reduce((sum, e) => sum + e.detailTrades.reduce((s, dt) => s + (Number(dt.today)||0), 0), 0);
            const totalCumulative = localData.reduce((sum, e) => sum + e.detailTrades.reduce((s, dt) => s + (Number(dt.cumulative)||0), 0), 0);

            const updateEntry = (eIdx, field, val) => { const newData = [...localData]; newData[eIdx][field] = val; setLocalData(newData); };
            const updateDetail = (eIdx, dtIdx, field, val) => { const newData = [...localData]; newData[eIdx].detailTrades[dtIdx][field] = field === 'name' ? val : Number(val); setLocalData(newData); };
            const removeEntry = (eIdx) => { if(confirm('이 업체의 출역 내용 전체를 삭제할까요?')) setLocalData(localData.filter((_, i) => i !== eIdx)); };
            const removeDetail = (eIdx, dtIdx) => { const newData = [...localData]; newData[eIdx].detailTrades = newData[eIdx].detailTrades.filter((_, i) => i !== dtIdx); setLocalData(newData); };
            const addDetailTrade = (eIdx) => { const newData = [...localData]; newData[eIdx].detailTrades.push({ id: `dt_new_${Date.now()}`, name: '', yesterday: 0, today: 0, cumulative: 0 }); setLocalData(newData); };
            const addEntry = () => { setLocalData([...localData, { id: `entry_new_${Date.now()}`, subName: '', trade: '', yesterdayTask: '', todayTask: '', detailTrades: [{ id: `dt_new_${Date.now()}_1`, name: '', yesterday: 0, today: 0, cumulative: 0 }] }]); };

            const onSave = () => { handleSaveDailyReport(reportDateStr, localData); setIsEditing(false); };
            const syncFromDB = () => { if(confirm('저장된 일보를 지우고 최신 데이터로 다시 덮어씌울까요?')) handleDeleteDailyReport(reportDateStr); };

            return (
                <div className="space-y-6 animate-fade-in">
                    <TabDescription text="[출역일보 관리] 출역 및 작업 탭에 입력된 데이터를 일자별로 자동 취합하여 하나의 일보로 생성합니다. 상단의 날짜를 변경하여 과거 일보를 조회/출력할 수 있으며, 원한다면 직접 표를 수정하여 보존할 수 있습니다." />
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="bg-white rounded-2xl shadow p-6 border border-slate-100 flex items-center justify-between">
                            <div><p className="text-sm font-bold text-slate-500 mb-1">전일 전체 출역 ({reportYesterdayStr.slice(5)})</p><p className="text-3xl font-black text-slate-700">{totalYesterday}명</p></div>
                            <div className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 text-xl"><i className="fa-solid fa-users"></i></div>
                        </div>
                        <div className="bg-blue-600 rounded-2xl shadow-lg p-6 border border-blue-500 flex items-center justify-between text-white">
                            <div><p className="text-sm font-bold text-blue-200 mb-1">선택일 전체 출역 ({reportDateStr.slice(5)})</p><p className="text-3xl font-black">{totalToday}명</p></div>
                            <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-white text-xl"><i className="fa-solid fa-users"></i></div>
                        </div>
                        <div className="bg-white rounded-2xl shadow p-6 border border-slate-100 flex items-center justify-between">
                            <div><p className="text-sm font-bold text-slate-500 mb-1">현장 총 누계 (~{reportDateStr.slice(5)})</p><p className="text-3xl font-black text-slate-800">{totalCumulative}명</p></div>
                            <div className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 text-xl"><i className="fa-solid fa-chart-line"></i></div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow border border-slate-100 overflow-hidden">
                        <div className="p-4 md:p-6 bg-slate-800 text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div className="flex flex-col">
                                <h3 className="font-bold text-lg flex items-center gap-2">
                                    <i className="fa-solid fa-file-lines text-blue-400"></i> 현장 출역일보 종합 
                                </h3>
                                <div className="flex gap-2 mt-1">
                                    {dailyReports.some(r => r.id === reportDateStr) && (
                                        <span className="text-[10px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/50 px-2 py-0.5 rounded">수동 저장된 기록 (프리즈)</span>
                                    )}
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex items-center gap-2 bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-600">
                                    <i className="fa-regular fa-calendar text-blue-300"></i>
                                    <input type="date" className="bg-transparent text-white outline-none text-sm font-bold [&::-webkit-calendar-picker-indicator]:filter [&::-webkit-calendar-picker-indicator]:invert cursor-pointer" value={reportDateStr} onChange={(e) => {setReportDateStr(e.target.value); setIsEditing(false);}} />
                                </div>
                                {isEditing ? (
                                    <div className="flex gap-2">
                                        <button onClick={onSave} className="text-xs bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded font-bold transition shadow-lg">저장 완료</button>
                                        <button onClick={() => setIsEditing(false)} className="text-xs bg-slate-600 hover:bg-slate-500 px-3 py-2 rounded font-bold transition">취소</button>
                                    </div>
                                ) : (
                                    <div className="flex gap-2">
                                        {!isGuest && (
                                            <>
                                                {dailyReports.some(r => r.id === reportDateStr) && (
                                                    <button onClick={syncFromDB} className="text-xs bg-amber-500 hover:bg-amber-600 text-white px-3 py-2 rounded shadow transition flex items-center gap-1">
                                                        <i className="fa-solid fa-rotate"></i> 최신 DB 강제연동
                                                    </button>
                                                )}
                                                <button className="text-xs bg-white/20 hover:bg-white/30 px-3 py-2 rounded font-bold transition" onClick={() => setIsEditing(true)}><i className="fa-solid fa-pen"></i> 표 수정 모드</button>
                                            </>
                                        )}
                                        <button className="text-xs bg-white/20 hover:bg-white/30 px-3 py-2 rounded font-bold transition" onClick={() => window.print()}><i className="fa-solid fa-print mr-1"></i> 출력</button>
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        <div className="overflow-x-auto print:overflow-visible relative">
                            {isEditing && <div className="absolute top-0 left-0 right-0 bg-blue-50/80 text-blue-600 text-[10px] font-bold py-1 text-center border-b border-blue-100 z-10 animate-pulse">현재 일보를 직접 편집 중입니다. 수정 후 반드시 '저장 완료'를 눌러주세요.</div>}
                            <table className="w-full text-sm text-center border-collapse mt-2">
                                <thead className="bg-slate-100 text-slate-700 text-xs font-bold border-b-2 border-slate-300">
                                    <tr>
                                        <th rowSpan="2" className="p-3 border-r border-slate-300 w-32">업체명 및 공종</th>
                                        <th colSpan="2" className="p-2 border-r border-slate-300 bg-slate-200/50">작업내용 (위치 및 내용)</th>
                                        <th colSpan="4" className="p-2">출역인원 (명)</th>
                                    </tr>
                                    <tr>
                                        <th className="p-2 border-r border-t border-slate-300 w-1/4">전일 ({reportYesterdayStr.slice(5)})</th>
                                        <th className="p-2 border-r border-t border-slate-300 w-1/4 text-blue-700">금일 ({reportDateStr.slice(5)})</th>
                                        <th className="p-2 border-r border-t border-slate-300 w-24 bg-slate-50">세부공종</th>
                                        <th className="p-2 border-r border-t border-slate-300 w-16 bg-slate-50">전일</th>
                                        <th className="p-2 border-r border-t border-slate-300 w-16 bg-blue-50 text-blue-700">금일</th>
                                        <th className="p-2 border-t border-slate-300 w-20 bg-slate-50">누계</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-200">
                                    {localData.map((entry, eIdx) => (
                                        entry.detailTrades.map((dt, dtIdx) => (
                                            <tr key={`${entry.id}-${dt.id}`} className="hover:bg-blue-50/30 transition">
                                                {dtIdx === 0 && (
                                                    <>
                                                        <td rowSpan={entry.detailTrades.length} className={`p-3 border-r border-slate-200 align-middle ${isEditing ? 'bg-amber-50/30' : 'bg-slate-50'}`}>
                                                            {isEditing ? (
                                                                <div className="flex flex-col gap-1.5">
                                                                    <input className="w-full border p-1.5 text-xs rounded font-bold outline-none focus:border-blue-400" placeholder="업체명" value={entry.subName} onChange={(e) => updateEntry(eIdx, 'subName', e.target.value)} />
                                                                    <input className="w-full border p-1.5 text-xs rounded text-blue-600 outline-none focus:border-blue-400" placeholder="공종" value={entry.trade} onChange={(e) => updateEntry(eIdx, 'trade', e.target.value)} />
                                                                    <button onClick={() => addDetailTrade(eIdx)} className="text-[10px] bg-blue-50 hover:bg-blue-100 text-blue-600 border border-blue-200 py-1 rounded w-full mt-1">세부공종 추가</button>
                                                                    <button onClick={() => removeEntry(eIdx)} className="text-[10px] text-rose-400 hover:text-rose-600 mt-1">이 업체행 삭제</button>
                                                                </div>
                                                            ) : (
                                                                <div>
                                                                    <div className="font-black text-slate-800">{entry.subName || '-'}</div>
                                                                    <div className="text-[10px] text-blue-600 mt-0.5">{entry.trade || '-'}</div>
                                                                </div>
                                                            )}
                                                        </td>
                                                        <td rowSpan={entry.detailTrades.length} className={`p-2 border-r border-slate-200 align-top ${isEditing ? 'bg-amber-50/30' : ''}`}>
                                                            {isEditing ? (
                                                                <textarea className="w-full h-24 p-1.5 border rounded text-xs outline-none focus:border-blue-400 resize-none whitespace-pre-wrap" placeholder="전일 작업내용" value={entry.yesterdayTask} onChange={(e) => updateEntry(eIdx, 'yesterdayTask', e.target.value)} />
                                                            ) : (
                                                                <div className="text-xs text-slate-600 text-left max-h-24 overflow-y-auto whitespace-pre-wrap leading-relaxed">{entry.yesterdayTask || '-'}</div>
                                                            )}
                                                        </td>
                                                        <td rowSpan={entry.detailTrades.length} className={`p-2 border-r border-slate-200 align-top ${isEditing ? 'bg-amber-50/30' : ''}`}>
                                                            {isEditing ? (
                                                                <textarea className="w-full h-24 p-1.5 border rounded text-xs outline-none focus:border-blue-400 resize-none whitespace-pre-wrap font-bold" placeholder="금일 작업내용" value={entry.todayTask} onChange={(e) => updateEntry(eIdx, 'todayTask', e.target.value)} />
                                                            ) : (
                                                                <div className="text-xs text-slate-800 font-bold text-left max-h-24 overflow-y-auto whitespace-pre-wrap leading-relaxed">{entry.todayTask || '-'}</div>
                                                            )}
                                                        </td>
                                                    </>
                                                )}
                                                <td className={`p-2 border-r border-slate-200 text-[11px] font-bold text-slate-600 ${isEditing ? 'bg-amber-50/30' : ''}`}>
                                                    {isEditing ? (
                                                        <div className="flex items-center gap-1">
                                                            <input className="w-full border p-1 rounded text-center outline-none focus:border-blue-400" value={dt.name} onChange={(e) => updateDetail(eIdx, dtIdx, 'name', e.target.value)} />
                                                            {entry.detailTrades.length > 1 && <button onClick={() => removeDetail(eIdx, dtIdx)} className="text-rose-400 hover:text-rose-600"><i className="fa-solid fa-xmark"></i></button>}
                                                        </div>
                                                    ) : dt.name}
                                                </td>
                                                <td className={`p-2 border-r border-slate-200 text-slate-500 ${isEditing ? 'bg-amber-50/30' : ''}`}>
                                                    {isEditing ? <input type="number" min="0" className="w-12 border p-1 rounded text-center outline-none focus:border-blue-400" value={dt.yesterday} onChange={(e) => updateDetail(eIdx, dtIdx, 'yesterday', e.target.value)} /> : (dt.yesterday > 0 ? dt.yesterday : '-')}
                                                </td>
                                                <td className={`p-2 border-r border-slate-200 font-bold text-blue-600 ${isEditing ? 'bg-amber-50/30' : 'bg-blue-50/30'}`}>
                                                    {isEditing ? <input type="number" min="0" className="w-12 border p-1 rounded text-center outline-none focus:border-blue-400 font-bold" value={dt.today} onChange={(e) => updateDetail(eIdx, dtIdx, 'today', e.target.value)} /> : (dt.today > 0 ? dt.today : '-')}
                                                </td>
                                                <td className={`p-2 font-black text-slate-700 ${isEditing ? 'bg-amber-50/30' : 'bg-slate-50/50'}`}>
                                                    {isEditing ? <input type="number" min="0" className="w-16 border p-1 rounded text-center outline-none focus:border-blue-400 font-black bg-slate-100" value={dt.cumulative} onChange={(e) => updateDetail(eIdx, dtIdx, 'cumulative', e.target.value)} /> : dt.cumulative}
                                                </td>
                                            </tr>
                                        ))
                                    ))}
                                    {isEditing && (
                                        <tr>
                                            <td colSpan="7" className="p-3 bg-slate-50/50 border-t border-slate-200">
                                                <button onClick={addEntry} className="w-full bg-white border border-dashed border-slate-300 text-slate-500 hover:bg-slate-100 hover:text-slate-700 font-bold py-3 rounded-lg text-xs transition"><i className="fa-solid fa-plus mr-1"></i> 새로운 업체 및 공종 칸 추가</button>
                                            </td>
                                        </tr>
                                    )}
                                    {!isEditing && localData.length === 0 && (
                                        <tr><td colSpan="7" className="p-10 text-slate-400">해당 일자에 조회 가능한 데이터가 없습니다.</td></tr>
                                    )}
                                </tbody>
                                <tfoot className="bg-slate-800 text-white font-bold">
                                    <tr>
                                        <td colSpan="4" className="p-3 border-r border-slate-700 text-right">선택일자 기준 총 계</td>
                                        <td className="p-3 border-r border-slate-700 text-center">{totalYesterday}</td>
                                        <td className="p-3 border-r border-slate-700 text-center text-blue-300">{totalToday}</td>
                                        <td className="p-3 text-center text-lg">{totalCumulative}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 컴포넌트: 출역 관리
        // ==========================================
        const AttendanceTab = ({ subcontractors, savedSubs, riskMapping, stats, loginRole, myCompany, isMaster, isGuest, handleAddSubToDB, handleUpdateSubToDB, handleApproveSubUpdate, handleRejectSubUpdate, deleteSubcontractor, handleUpdateRiskMapping, handleClockOut, todayStr }) => {
            const defaultTrade = Object.keys(riskMapping)[0] || '';
            const [selectedBoardDate, setSelectedBoardDate] = useState(todayStr);
            const [newSub, setNewSub] = useState({ date: todayStr, name: isMaster ? '' : myCompany, trade: defaultTrade, manager: '', phone: '', early: 0, day: 0, night: 0, elderly: 0, new: 0, foreigner: 0, female: 0, workers: [] });
            const [editState, setEditState] = useState(null);
            const [selectedSubForWorkers, setSelectedSubForWorkers] = useState(null);

            const handleSubChange = (e) => {
                const selected = savedSubs.find(s => s.name === e.target.value);
                setNewSub(prev => ({ ...prev, name: e.target.value, manager: selected?.manager || '', phone: selected?.phone || '' }));
            };
            
            const addWorker = () => setNewSub({...newSub, workers: [...newSub.workers, { name: '', shift: '주간', detailTrade: '' }]});
            const removeWorker = (idx) => setNewSub({...newSub, workers: newSub.workers.filter((_, i) => i !== idx)});
            const handleWorkerChange = (idx, field, val) => {
                const nw = [...newSub.workers];
                nw[idx][field] = val;
                setNewSub({...newSub, workers: nw});
            };

            const workerCounts = {
                early: newSub.workers.filter(w => w.shift === '조출').length,
                day: newSub.workers.filter(w => w.shift === '주간').length,
                night: newSub.workers.filter(w => w.shift === '야간').length
            };

            const formatTs = (ts) => {
                const d = new Date(ts);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            };

            const onSubmit = (e) => {
                e.preventDefault();
                if(isGuest) return;
                if (!newSub.name || !newSub.manager) return alert('협력사 정보를 완성해 주세요.');
                handleAddSubToDB(newSub);
                setNewSub({ ...newSub, early:0, day:0, night:0, elderly:0, new:0, foreigner:0, female:0, workers: [] });
            };

            const isAllClockedOut = (sub) => (sub.early === 0 || sub.clockedOut?.early) && (sub.day === 0 || sub.clockedOut?.day) && (sub.night === 0 || sub.clockedOut?.night) && ((sub.early||0) + (sub.day||0) + (sub.night||0) > 0);

            const todaysSubs = subcontractors.filter(sub => (sub.date || formatTs(sub.createdAt)) === selectedBoardDate);

            const getCumulative = (subName) => {
                return subcontractors
                    .filter(s => s.name === subName && s.status === 'approved' && (s.date || formatTs(s.createdAt)) <= selectedBoardDate)
                    .reduce((sum, s) => sum + (s.early||0) + (s.day||0) + (s.night||0), 0);
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <TabDescription text="[출역 및 인원 관리] 현장에 투입되는 협력사별 인원(조출/주간/야간)과 취약 근로자를 세부적으로 등록하고 추적 관리합니다. 당일 데이터만 보드에 나타나며 날짜를 변경해 과거 내역을 볼 수 있습니다." />
                    
                    {!isGuest && (
                        <div className="bg-white rounded-2xl shadow border border-slate-100 p-6 md:p-8 relative overflow-hidden">
                            <h2 className="text-xl font-bold mb-6 flex items-center gap-2"><i className="fa-solid fa-user-plus text-blue-600"></i> 신규 출역 및 TBM 등록</h2>
                            <form onSubmit={onSubmit} className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-5 gap-5">
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-600">작업 일자</label>
                                        <input type="date" className="w-full p-3 border border-slate-200 rounded-xl text-sm bg-slate-50 font-bold focus:border-blue-500 focus:ring-1 focus:ring-blue-200 outline-none" value={newSub.date} onChange={e => setNewSub({...newSub, date: e.target.value})} required/>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-600">협력사명</label>
                                        <div className="space-y-1.5">
                                            <select className="w-full p-3 border border-slate-200 rounded-xl text-sm bg-slate-50 font-medium focus:border-blue-500 focus:ring-1 focus:ring-blue-200 outline-none" value={newSub.name} onChange={handleSubChange} disabled={!isMaster} required>
                                                <option value="" disabled>협력사 선택</option>
                                                {savedSubs.map((s, i) => <option key={i} value={s.name}>{s.name}</option>)}
                                            </select>
                                            {isMaster && <p className="text-[10px] text-blue-500 font-bold">* 협력사 추가/수정은 [설정] 탭을 이용하세요.</p>}
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-600">공종</label>
                                        <div className="flex gap-1.5">
                                            <select className="flex-1 p-3 border border-slate-200 rounded-xl text-sm bg-slate-50 font-medium" value={newSub.trade} onChange={e => setNewSub({...newSub, trade: e.target.value})}>
                                                {Object.keys(riskMapping).map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                            {isMaster && <button type="button" onClick={() => { const tr = prompt('신규 공종?'); if(tr) handleUpdateRiskMapping(tr, '기본안전수칙'); }} className="bg-slate-800 text-white w-12 rounded-xl flex items-center justify-center shadow"><i className="fa-solid fa-plus"></i></button>}
                                            {isMaster && <button type="button" onClick={() => { if(confirm('공종 삭제?')) handleUpdateRiskMapping(newSub.trade, null); }} className="bg-rose-100 text-rose-600 w-12 rounded-xl flex items-center justify-center shadow-sm"><i className="fa-solid fa-minus"></i></button>}
                                        </div>
                                    </div>
                                    <div className="space-y-2"><label className="text-xs font-bold text-slate-600">소장/관리자</label><input type="text" className="w-full p-3 border border-slate-200 rounded-xl text-sm bg-slate-50 font-medium" value={newSub.manager} onChange={e => setNewSub({...newSub, manager: e.target.value})} required/></div>
                                    <div className="space-y-2"><label className="text-xs font-bold text-slate-600">연락처</label><input type="text" className="w-full p-3 border border-slate-200 rounded-xl text-sm bg-slate-50 font-medium" value={newSub.phone} onChange={e => setNewSub({...newSub, phone: e.target.value})}/></div>
                                </div>

                                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 grid grid-cols-2 md:grid-cols-7 gap-5">
                                    <div className="space-y-2"><label className="block text-xs font-extrabold text-center text-blue-700">조출</label><input type="number" min="0" className="w-full text-center p-3 border rounded-xl" value={newSub.early} onChange={e => setNewSub({...newSub, early: Number(e.target.value)})}/></div>
                                    <div className="space-y-2"><label className="block text-xs font-extrabold text-center text-blue-700">주간</label><input type="number" min="0" className="w-full text-center p-3 border rounded-xl" value={newSub.day} onChange={e => setNewSub({...newSub, day: Number(e.target.value)})}/></div>
                                    <div className="space-y-2"><label className="block text-xs font-extrabold text-center text-blue-700">야간</label><input type="number" min="0" className="w-full text-center p-3 border rounded-xl" value={newSub.night} onChange={e => setNewSub({...newSub, night: Number(e.target.value)})}/></div>
                                    <div className="col-span-2 md:col-span-4 bg-white p-4 rounded-xl border grid grid-cols-4 gap-3 relative mt-2 md:mt-0">
                                        <span className="absolute -top-3 left-4 bg-slate-800 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">취약 근로자 포함</span>
                                        <div className="mt-1"><label className="block text-[11px] font-bold text-center text-rose-600">고령</label><input type="number" min="0" className="w-full text-center p-2 border rounded-lg text-sm bg-slate-50" value={newSub.elderly} onChange={e => setNewSub({...newSub, elderly: Number(e.target.value)})}/></div>
                                        <div className="mt-1"><label className="block text-[11px] font-bold text-center text-orange-500">신규</label><input type="number" min="0" className="w-full text-center p-2 border rounded-lg text-sm bg-slate-50" value={newSub.new} onChange={e => setNewSub({...newSub, new: Number(e.target.value)})}/></div>
                                        <div className="mt-1"><label className="block text-[11px] font-bold text-center text-blue-600">외국</label><input type="number" min="0" className="w-full text-center p-2 border rounded-lg text-sm bg-slate-50" value={newSub.foreigner} onChange={e => setNewSub({...newSub, foreigner: Number(e.target.value)})}/></div>
                                        <div className="mt-1"><label className="block text-[11px] font-bold text-center text-purple-600">여성</label><input type="number" min="0" className="w-full text-center p-2 border rounded-lg text-sm bg-slate-50" value={newSub.female} onChange={e => setNewSub({...newSub, female: Number(e.target.value)})}/></div>
                                    </div>
                                </div>

                                <div className="bg-white p-5 rounded-2xl border border-slate-200">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-2">
                                        <h3 className="text-sm font-bold text-slate-700"><i className="fa-solid fa-clipboard-user text-blue-500 mr-1"></i> 세부 출역 인원 명단 (옵션)</h3>
                                        <div className="flex gap-3 text-[11px] font-bold bg-slate-50 px-3 py-1.5 rounded-lg border">
                                            <span className={workerCounts.early === newSub.early ? 'text-emerald-600' : 'text-rose-500'}>조출 일치여부: {workerCounts.early}/{newSub.early}</span>
                                            <span className="text-slate-300">|</span>
                                            <span className={workerCounts.day === newSub.day ? 'text-emerald-600' : 'text-rose-500'}>주간 일치여부: {workerCounts.day}/{newSub.day}</span>
                                            <span className="text-slate-300">|</span>
                                            <span className={workerCounts.night === newSub.night ? 'text-emerald-600' : 'text-rose-500'}>야간 일치여부: {workerCounts.night}/{newSub.night}</span>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        {newSub.workers.map((w, idx) => (
                                            <div key={idx} className="relative flex flex-col md:flex-row gap-2 text-sm p-3 md:p-0 border border-slate-200 md:border-0 rounded-xl md:rounded-none bg-white md:bg-transparent">
                                                <div className="flex gap-2 pr-8 md:pr-0">
                                                    <select className="w-20 p-2 border rounded-lg bg-slate-50 outline-none focus:bg-white" value={w.shift} onChange={(e) => handleWorkerChange(idx, 'shift', e.target.value)}>
                                                        <option>조출</option><option>주간</option><option>야간</option>
                                                    </select>
                                                    <input className="flex-1 p-2 border rounded-lg bg-slate-50 outline-none focus:bg-white" placeholder="이름 (예: 홍길동)" value={w.name} onChange={(e) => handleWorkerChange(idx, 'name', e.target.value)}/>
                                                </div>
                                                <input className="w-full md:flex-1 p-2 border rounded-lg bg-slate-50 outline-none focus:bg-white" placeholder="세부공종 (예: 형틀목수)" value={w.detailTrade} onChange={(e) => handleWorkerChange(idx, 'detailTrade', e.target.value)}/>
                                                <button type="button" onClick={() => removeWorker(idx)} className="absolute top-3 right-2 md:static md:top-auto md:right-auto text-rose-400 hover:text-rose-600 px-2 flex items-center justify-center">
                                                    <i className="fa-solid fa-xmark text-lg md:text-base"></i>
                                                </button>
                                            </div>
                                        ))}
                                        <button type="button" onClick={addWorker} className="w-full bg-slate-50 border border-dashed border-blue-300 text-blue-600 font-bold py-2.5 rounded-xl text-xs hover:bg-blue-50 transition mt-2"><i className="fa-solid fa-plus mr-1"></i> 인원 명단 추가</button>
                                    </div>
                                </div>

                                <div className="flex justify-end"><button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition"><i className="fa-solid fa-check mr-2"></i>{isMaster ? '출역 등록' : '출역 등록 요청'}</button></div>
                            </form>
                        </div>
                    )}

                    <div className="bg-white rounded-2xl shadow border border-slate-100 overflow-hidden">
                        <div className="p-4 md:p-6 bg-slate-50/50 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <h3 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                                현장 출역 현황 보드
                                <input type="date" className="ml-2 bg-white border border-slate-200 px-2 py-1 rounded text-sm font-bold text-blue-600 outline-none" value={selectedBoardDate} onChange={(e) => setSelectedBoardDate(e.target.value)} />
                            </h3>
                            <div className="flex gap-4 text-sm bg-white p-2 px-4 rounded-lg shadow-sm border border-slate-200">
                                <div>총 투입 <span className="font-bold text-blue-600 ml-1">{todaysSubs.reduce((a,c)=>a+(c.early||0)+(c.day||0)+(c.night||0), 0)}명</span></div>
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-800 text-slate-200 font-medium text-xs">
                                    <tr>
                                        <th className="p-4 border-r border-slate-700">협력사 및 공종</th>
                                        <th className="p-4 border-r border-slate-700 text-center w-16">조출</th>
                                        <th className="p-4 border-r border-slate-700 text-center w-16">주간</th>
                                        <th className="p-4 border-r border-slate-700 text-center w-16">야간</th>
                                        <th className="p-4 border-r border-slate-700 text-center w-24">총 누계</th>
                                        <th className="p-4 border-r border-slate-700 text-center w-28">취약 (고/신/외/여)</th>
                                        <th className="p-4 text-center w-24">관리</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {todaysSubs.length === 0 ? <tr><td colSpan="7" className="p-10 text-center text-slate-400">선택된 날짜에 등록된 출역 데이터가 없습니다.</td></tr> : todaysSubs.map(sub => {
                                        const isEditing = editState?.id === sub.id;
                                        const canEdit = !isGuest && (isMaster || sub.name === myCompany);
                                        const isPending = sub.status === 'pending_update';
                                        const cum = getCumulative(sub.name);

                                        return (
                                            <tr key={sub.id} className={`${isAllClockedOut(sub) ? 'opacity-50 bg-slate-50' : 'hover:bg-blue-50/30'}`}>
                                                <td className="p-4 border-r border-slate-100">
                                                    <div className="font-bold text-slate-800 cursor-pointer hover:text-blue-600 transition inline-block" onClick={() => setSelectedSubForWorkers(sub)}>
                                                        {sub.name} <i className="fa-solid fa-magnifying-glass text-[10px] text-slate-400 ml-1"></i>
                                                    </div>
                                                    <div className="text-blue-600 text-xs mt-0.5">{sub.trade}</div>
                                                    {isPending && <span className="inline-block mt-1 bg-amber-100 text-amber-700 text-[10px] px-2 py-0.5 rounded font-bold">수정 승인 대기중</span>}
                                                </td>
                                                {['early', 'day', 'night'].map(shift => (
                                                    <td key={shift} className="p-3 border-r border-slate-100 text-center">
                                                        {isEditing ? (
                                                            <input type="number" className="w-12 text-center border rounded p-1" value={editState[shift]} onChange={e=>setEditState({...editState, [shift]: Number(e.target.value)})} />
                                                        ) : (
                                                            <div>
                                                                <div className="font-black text-slate-700 text-base">{sub[shift]}</div>
                                                                {isPending && sub.pendingData && sub.pendingData[shift] !== sub[shift] && <div className="text-amber-600 text-[10px] font-bold">→ {sub.pendingData[shift]}</div>}
                                                                {!isEditing && sub[shift] > 0 && !isGuest && (
                                                                    sub.clockedOut?.[shift] ? 
                                                                    <span className="text-[10px] bg-slate-200 px-2 py-1 rounded block mt-1">완료</span> : 
                                                                    <button onClick={()=>handleClockOut(sub.id, shift, sub.name)} className="text-[10px] bg-rose-500 text-white px-2 py-1 rounded block w-full mt-1">퇴근</button>
                                                                )}
                                                            </div>
                                                        )}
                                                    </td>
                                                ))}
                                                <td className="p-3 border-r border-slate-100 text-center"><div className="font-black text-blue-600 text-base">{cum}명</div></td>
                                                <td className="p-3 border-r border-slate-100 text-center">
                                                    {isEditing ? (
                                                        <div className="grid grid-cols-2 gap-1 text-[10px]">
                                                            <input type="number" placeholder="고" className="border rounded p-1 w-full" value={editState.elderly} onChange={e=>setEditState({...editState, elderly: Number(e.target.value)})}/>
                                                            <input type="number" placeholder="신" className="border rounded p-1 w-full" value={editState.new} onChange={e=>setEditState({...editState, new: Number(e.target.value)})}/>
                                                            <input type="number" placeholder="외" className="border rounded p-1 w-full" value={editState.foreigner} onChange={e=>setEditState({...editState, foreigner: Number(e.target.value)})}/>
                                                            <input type="number" placeholder="여" className="border rounded p-1 w-full" value={editState.female} onChange={e=>setEditState({...editState, female: Number(e.target.value)})}/>
                                                        </div>
                                                    ) : (
                                                        <div className="text-xs font-bold text-slate-500 tracking-widest">{sub.elderly}/{sub.new}/{sub.foreigner}/{sub.female}</div>
                                                    )}
                                                </td>
                                                <td className="p-3 text-center space-y-1">
                                                    {isGuest ? (
                                                        <span className="text-[10px] text-slate-400">조회 전용</span>
                                                    ) : isEditing ? (
                                                        <div className="flex gap-1 justify-center">
                                                            <button onClick={() => { handleUpdateSubToDB(sub.id, editState, isMaster); setEditState(null); }} className="bg-blue-600 text-white text-[10px] px-2 py-1 rounded">{isMaster ? '수정 완료' : '수정 요청'}</button>
                                                            <button onClick={() => setEditState(null)} className="bg-slate-400 text-white text-[10px] px-2 py-1 rounded">취소</button>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            {isPending && isMaster ? (
                                                                <div className="flex gap-1 justify-center">
                                                                    <button onClick={() => handleApproveSubUpdate(sub.id, sub.pendingData)} className="bg-emerald-500 text-white text-[10px] px-2 py-1 rounded font-bold">승인</button>
                                                                    <button onClick={() => handleRejectSubUpdate(sub.id)} className="bg-rose-500 text-white text-[10px] px-2 py-1 rounded font-bold">반려</button>
                                                                </div>
                                                            ) : (
                                                                canEdit && !isPending && <button onClick={() => setEditState({id: sub.id, ...sub})} className="bg-slate-100 border text-slate-600 text-[10px] px-3 py-1.5 rounded hover:bg-slate-200 w-full font-bold shadow-sm">수정</button>
                                                            )}
                                                            {isMaster && <button onClick={() => deleteSubcontractor(sub.id)} className="text-slate-400 hover:text-rose-500 text-[10px] px-2 py-1 w-full"><i className="fa-solid fa-trash-can"></i> 삭제</button>}
                                                        </>
                                                    )}
                                                </td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {selectedSubForWorkers && (
                        <div className="fixed inset-0 z-50 bg-black/60 flex justify-center items-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl animate-fade-in-down max-h-[80vh] flex flex-col">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-bold text-slate-800">{selectedSubForWorkers.name} 세부 명단</h3>
                                    <button onClick={() => setSelectedSubForWorkers(null)} className="text-slate-400 hover:text-rose-500 text-xl"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="overflow-y-auto flex-1 border rounded-xl bg-slate-50">
                                    {(!selectedSubForWorkers.workers || selectedSubForWorkers.workers.length === 0) ? (
                                        <div className="p-6 text-center text-slate-400 text-sm font-medium">등록된 세부 명단이 없습니다.</div>
                                    ) : (
                                        <ul className="divide-y divide-slate-200">
                                            {selectedSubForWorkers.workers.map((w, idx) => (
                                                <li key={idx} className="p-4 flex items-center justify-between bg-white hover:bg-blue-50/50 transition">
                                                    <div className="flex items-center gap-3">
                                                        <span className={`text-[10px] font-black px-2 py-1 rounded text-white ${w.shift==='조출'?'bg-rose-500':w.shift==='주간'?'bg-blue-500':'bg-slate-800'}`}>{w.shift}</span>
                                                        <span className="font-bold text-slate-800">{w.name || '이름없음'}</span>
                                                    </div>
                                                    <span className="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded border">{w.detailTrade || '공종 미입력'}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    )}
                                </div>
                                <div className="mt-4 flex justify-end">
                                    <button onClick={() => setSelectedSubForWorkers(null)} className="bg-slate-800 text-white px-6 py-2.5 rounded-xl font-bold shadow">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 컴포넌트: 작업 및 위험관리 (Tasks)
        // ==========================================
        const TasksTab = ({ tasks, riskMapping, savedSubs, isMaster, isGuest, myCompany, todayStr, handleAddTaskToDB, handleUpdateTaskToDB, handleApproveTaskUpdate, handleRejectTaskUpdate, deleteTask }) => {
            const defaultTrade = Object.keys(riskMapping)[0] || '';
            const defaultDetail = { location: '', task: '', risk: '', safety: '' };
            const [selectedBoardDate, setSelectedBoardDate] = useState(todayStr);
            const [newTask, setNewTask] = useState({ date: todayStr, subName: isMaster ? '' : myCompany, trade: defaultTrade, equip: '', details: [{ ...defaultDetail }] });
            const [editState, setEditState] = useState(null);

            const formatTs = (ts) => {
                const d = new Date(ts);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            };

            const handleDetailChange = (i, f, v, isEdit=false) => { 
                if(isEdit) {
                    const nd = [...editState.details]; nd[i][f] = v; setEditState({...editState, details: nd});
                } else {
                    const nd = [...newTask.details]; nd[i][f] = v; setNewTask({...newTask, details: nd}); 
                }
            };
            
            const onSubmit = (e) => {
                e.preventDefault();
                if(isGuest) return;
                if (!newTask.subName) return alert('협력사명을 선택하세요.');
                for (let d of newTask.details) { if(!d.task.trim() || !d.location.trim()) return alert('작업내용과 위치를 모두 입력하세요.'); }
                handleAddTaskToDB({...newTask});
                setNewTask({ date: selectedBoardDate, subName: isMaster ? '' : myCompany, trade: defaultTrade, equip: '', details: [{ ...defaultDetail }] });
            };

            const todaysTasks = tasks.filter(t => (t.date || formatTs(t.createdAt)) === selectedBoardDate);

            return (
                <div className="space-y-6 animate-fade-in">
                    <TabDescription text="[위험 관리 등록] 금일 진행되는 공종별 세부 작업 위치, 작업 내용, 위험 요소와 안전 대책을 등록하여 현장의 안전사고를 예방합니다." />
                    
                    {!isGuest && (
                        <div className="bg-white rounded-2xl shadow border border-slate-100 p-6 md:p-8">
                            <h2 className="text-xl font-bold mb-6 flex items-center gap-2"><i className="fa-solid fa-list-check text-blue-600"></i> 작업/장비 및 세부 위험요소 등록</h2>
                            <form onSubmit={onSubmit} className="space-y-4">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-600">작업 일자</label>
                                        <input type="date" className="w-full p-3 border border-slate-200 rounded-xl text-sm bg-slate-50 font-bold focus:border-blue-500 focus:ring-1 focus:ring-blue-200 outline-none" value={newTask.date} onChange={e=>setNewTask({...newTask, date:e.target.value})} required/>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-600">협력사명</label>
                                        <select className="w-full p-3 border border-slate-200 rounded-xl text-sm bg-slate-50 font-bold focus:border-blue-500 focus:ring-1 focus:ring-blue-200 outline-none" value={newTask.subName} onChange={e=>setNewTask({...newTask, subName:e.target.value})} disabled={!isMaster} required>
                                            <option value="" disabled>협력사 선택</option>
                                            {savedSubs.map((s, i) => <option key={i} value={s.name}>{s.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-600">공종</label>
                                        <select className="w-full p-3 border border-slate-200 rounded-xl text-sm bg-slate-50 font-bold focus:border-blue-500 focus:ring-1 focus:ring-blue-200 outline-none" value={newTask.trade} onChange={e=>setNewTask({...newTask, trade:e.target.value})}>
                                            {Object.keys(riskMapping).map(t=><option key={t}>{t}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2"><label className="text-xs font-bold text-slate-600">투입장비 (선택)</label><input type="text" className="w-full p-3 border rounded-xl text-sm bg-slate-50" placeholder="예: 펌프카 1대" value={newTask.equip} onChange={e=>setNewTask({...newTask, equip:e.target.value})}/></div>
                                </div>
                                
                                <div className="bg-slate-50 p-5 rounded-2xl border border-dashed border-slate-300 space-y-4">
                                    <p className="text-sm font-extrabold text-slate-700 flex items-center gap-2"><i className="fa-solid fa-layer-group text-blue-500"></i> 세부 작업 리스트 등록</p>
                                    {newTask.details.map((d, i) => (
                                        <div key={i} className="bg-white p-4 rounded-xl border shadow-sm space-y-3 relative">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                <div><label className="text-[10px] font-bold text-slate-500 block mb-1">1. 작업 위치</label><input className="w-full p-2 border rounded-lg text-sm bg-slate-50 focus:bg-white" placeholder="예: 101동 5층" value={d.location} onChange={e=>handleDetailChange(i,'location',e.target.value)} required/></div>
                                                <div><label className="text-[10px] font-bold text-slate-500 block mb-1">2. 작업 내용</label><input className="w-full p-2 border rounded-lg text-sm bg-slate-50 focus:bg-white" placeholder="예: 알폼 해체" value={d.task} onChange={e=>handleDetailChange(i,'task',e.target.value)} required/></div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                <div><label className="text-[10px] font-bold text-rose-500 block mb-1">3. 위험 요소</label><input className="w-full p-2 border rounded-lg text-sm bg-rose-50 focus:bg-white" placeholder="예: 개구부 추락 위험" value={d.risk} onChange={e=>handleDetailChange(i,'risk',e.target.value)} required/></div>
                                                <div><label className="text-[10px] font-bold text-emerald-500 block mb-1">4. 안전 대책</label><input className="w-full p-2 border rounded-lg text-sm bg-emerald-50 focus:bg-white" placeholder="예: 안전대 체결 및 생명줄 확인" value={d.safety} onChange={e=>handleDetailChange(i,'safety',e.target.value)} required/></div>
                                            </div>
                                            {i > 0 && <button type="button" onClick={()=>setNewTask({...newTask, details:newTask.details.filter((_,idx)=>idx!==i)})} className="absolute top-2 right-2 bg-rose-100 text-rose-500 rounded-full w-6 h-6 flex justify-center items-center"><i className="fa-solid fa-xmark text-xs"></i></button>}
                                        </div>
                                    ))}
                                    <button type="button" onClick={()=>setNewTask({...newTask, details:[...newTask.details, {...defaultDetail}]})} className="w-full py-2 bg-white border border-blue-200 rounded-xl text-sm font-bold text-blue-600 hover:bg-blue-50 transition"><i className="fa-solid fa-plus mr-1"></i> 세부 작업 추가</button>
                                </div>
                                <div className="flex justify-end pt-2"><button type="submit" className="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold shadow-lg"><i className="fa-solid fa-cloud-arrow-up mr-2"></i>{isMaster ? '작업 동기화 등록' : '작업 동기화 요청'}</button></div>
                            </form>
                        </div>
                    )}

                    <div className="space-y-4">
