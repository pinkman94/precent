                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-2">
                            <h3 className="font-bold text-slate-800 ml-2 flex items-center gap-2">등록된 작업 내역 보드 <input type="date" className="bg-white border border-slate-200 px-2 py-1 rounded text-sm font-bold text-blue-600 outline-none" value={selectedBoardDate} onChange={(e) => setSelectedBoardDate(e.target.value)} /></h3>
                        </div>
                        {todaysTasks.length === 0 ? <div className="bg-white rounded-2xl shadow p-10 text-center text-slate-400">선택된 날짜에 등록된 작업이 없습니다.</div> : todaysTasks.map(t => {
                            const isPending = t.status === 'pending_update';
                            const canEdit = !isGuest && (isMaster || t.subName === myCompany);
                            const isEditing = editState?.id === t.id;
                            const displayData = isEditing ? editState : (isPending && isMaster ? t.pendingData : t);

                            return (
                                <div key={t.id} className={`bg-white border rounded-2xl overflow-hidden shadow-sm transition-all ${isPending ? 'border-amber-300 ring-2 ring-amber-100' : 'border-slate-200'}`}>
                                    <div className="bg-slate-800 p-4 flex justify-between items-center text-white">
                                        <div className="flex items-center gap-3">
                                            <span className="font-bold text-lg">{displayData.trade}</span>
                                            <span className="text-xs bg-white/20 px-2 py-1 rounded">{t.subName}</span>
                                            {isPending && <span className="bg-amber-500 text-white text-[10px] px-2 py-0.5 rounded font-bold animate-pulse">수정 승인 대기중</span>}
                                        </div>
                                        <div className="flex gap-2">
                                            {isEditing ? (
                                                <>
                                                    <button onClick={()=>{ handleUpdateTaskToDB(t.id, editState, isMaster); setEditState(null); }} className="text-xs bg-blue-500 px-3 py-1 rounded font-bold shadow">{isMaster ? '수정 완료' : '수정 요청'}</button>
                                                    <button onClick={()=>setEditState(null)} className="text-xs bg-slate-500 px-3 py-1 rounded">취소</button>
                                                </>
                                            ) : (
                                                <>
                                                    {isPending && isMaster && !isGuest ? (
                                                        <>
                                                            <button onClick={()=>handleApproveTaskUpdate(t.id, t.pendingData)} className="text-xs bg-emerald-500 px-3 py-1 rounded font-bold">승인</button>
                                                            <button onClick={()=>handleRejectTaskUpdate(t.id)} className="text-xs bg-rose-500 px-3 py-1 rounded font-bold">반려</button>
                                                        </>
                                                    ) : (
                                                        canEdit && !isPending && <button onClick={()=>setEditState({id: t.id, ...t})} className="text-xs bg-white/20 hover:bg-white/40 px-3 py-1 rounded transition"><i className="fa-solid fa-pen"></i> 수정</button>
                                                    )}
                                                    {isMaster && !isGuest && <button onClick={()=>deleteTask(t.id)} className="text-xs bg-rose-500/80 hover:bg-rose-500 px-3 py-1 rounded ml-2"><i className="fa-solid fa-trash-can"></i> 삭제</button>}
                                                </>
                                            )}
                                        </div>
                                    </div>
                                    <div className="p-5 space-y-4">
                                        {displayData.equip && <div className="text-sm"><span className="font-bold text-slate-500">투입 장비:</span> {displayData.equip}</div>}
                                        <div className="space-y-3">
                                            {displayData.details.map((d, idx) => (
                                                <div key={idx} className="bg-slate-50 rounded-xl p-4 border border-slate-100">
                                                    {isEditing ? (
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-sm">
                                                            <input className="border p-2 rounded" placeholder="위치" value={d.location} onChange={e=>handleDetailChange(idx,'location',e.target.value,true)}/>
                                                            <input className="border p-2 rounded" placeholder="작업내용" value={d.task} onChange={e=>handleDetailChange(idx,'task',e.target.value,true)}/>
                                                            <input className="border p-2 rounded border-rose-200 bg-rose-50" placeholder="위험요소" value={d.risk} onChange={e=>handleDetailChange(idx,'risk',e.target.value,true)}/>
                                                            <input className="border p-2 rounded border-emerald-200 bg-emerald-50" placeholder="안전대책" value={d.safety} onChange={e=>handleDetailChange(idx,'safety',e.target.value,true)}/>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            <div className="flex items-center gap-2 mb-2">
                                                                <span className="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded font-bold">{idx+1}</span>
                                                                <span className="font-bold text-slate-800">{d.location}</span>
                                                                <span className="text-slate-300">|</span>
                                                                <span className="text-slate-600 font-medium">{d.task}</span>
                                                            </div>
                                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-2 text-xs">
                                                                <div className="bg-white p-2 rounded border border-rose-100"><span className="font-bold text-rose-500 block mb-1"><i className="fa-solid fa-triangle-exclamation"></i> 위험요소</span>{d.risk}</div>
                                                                <div className="bg-white p-2 rounded border border-emerald-100"><span className="font-bold text-emerald-500 block mb-1"><i className="fa-solid fa-shield-halved"></i> 안전대책</span>{d.safety}</div>
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                            ))}
                                            {isEditing && <button onClick={()=>setEditState({...editState, details:[...editState.details, {...defaultDetail}]})} className="w-full text-xs py-2 bg-slate-100 rounded text-slate-600 font-bold border"><i className="fa-solid fa-plus"></i> 항목 추가</button>}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 자재반입, 체크리스트, 설정 등 (이전 탭들과 동일하게 유지)
        // ==========================================
        const MaterialTab = ({ materials, isMaster, isGuest, myCompany, handleAddMaterial, handleApproveMaterial, handleDeleteMaterial }) => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [showModal, setShowModal] = useState(false);
            const [selectedDateStr, setSelectedDateStr] = useState('');
            const [newMat, setNewMat] = useState({ time: '오전', text: '' });

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();

            const renderDays = () => {
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(<div key={`empty-${i}`} className="p-2 border-r border-b border-slate-100 bg-slate-50/50"></div>);
                
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const formatTs = (ts) => {
                        const d2 = new Date(ts);
                        return `${d2.getFullYear()}-${String(d2.getMonth() + 1).padStart(2, '0')}-${String(d2.getDate()).padStart(2, '0')}`;
                    };
                    const dayMats = materials.filter(m => (m.date || formatTs(m.createdAt)) === dateStr);
                    
                    days.push(
                        <div key={d} onClick={()=>{ if(!isGuest){setSelectedDateStr(dateStr); setShowModal(true);} }} className={`p-2 border-r border-b border-slate-100 min-h-[100px] bg-white ${isGuest ? '' : 'hover:bg-blue-50 cursor-pointer'} group transition relative`}>
                            <span className="text-xs font-bold text-slate-500 group-hover:text-blue-600">{d}</span>
                            <div className="mt-1 flex flex-col gap-1">
                                {dayMats.map(m => (
                                    <div key={m.id} className={`text-[9px] px-1.5 py-1 rounded shadow-sm flex flex-col gap-0.5 ${m.status === 'approved' ? 'bg-blue-100 text-blue-800' : 'bg-amber-100 text-amber-800 border border-amber-200'}`}>
                                        <div className="flex justify-between items-start font-bold">
                                            <div>
                                                <span>[{m.time}]</span> {m.status==='pending' && <span className="animate-pulse ml-1 text-amber-600">미확정</span>}
                                            </div>
                                            {isMaster && !isGuest && (
                                                <button onClick={(e) => { e.stopPropagation(); handleDeleteMaterial(m.id); }} className="text-rose-400 hover:text-rose-600 px-1" title="일정 삭제">
                                                    <i className="fa-solid fa-xmark"></i>
                                                </button>
                                            )}
                                        </div>
                                        <div className="truncate text-slate-700">{m.subName} - {m.text}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            const submitMat = (e) => {
                e.preventDefault();
                if(isGuest) return;
                if(!newMat.text.trim()) return;
                handleAddMaterial({ date: selectedDateStr, time: newMat.time, text: newMat.text, subName: isMaster ? '원청' : myCompany });
                setShowModal(false); setNewMat({ time: '오전', text: '' });
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <TabDescription text="[자재 반입 캘린더] 달력 형태로 현장의 일일 자재 반입 일정을 등록하고 조율하여 특정 날짜의 물류 혼잡을 사전에 방지합니다." />
                    
                    <div className="bg-white rounded-2xl shadow border border-slate-100 overflow-hidden">
                        <div className="p-6 bg-slate-800 text-white flex justify-between items-center">
                            <h2 className="text-lg font-bold flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-400"></i> 자재반입 및 일정 관리</h2>
                            <div className="flex items-center gap-4">
                                <button onClick={()=>setCurrentDate(new Date(year, month - 1, 1))} className="hover:text-blue-400"><i className="fa-solid fa-chevron-left"></i></button>
                                <span className="font-black text-xl tracking-widest">{year}. {String(month+1).padStart(2,'0')}</span>
                                <button onClick={()=>setCurrentDate(new Date(year, month + 1, 1))} className="hover:text-blue-400"><i className="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div className="grid grid-cols-7 border-b border-slate-200 bg-slate-50">
                            {['일','월','화','수','목','금','토'].map(day => <div key={day} className="py-3 text-center text-xs font-bold text-slate-500 border-r border-slate-200">{day}</div>)}
                        </div>
                        <div className="grid grid-cols-7">
                            {renderDays()}
                        </div>
                    </div>

                    {isMaster && !isGuest && materials.filter(m => m.status === 'pending').length > 0 && (
                        <div className="bg-amber-50 rounded-2xl p-6 border border-amber-200 shadow-sm">
                            <h3 className="font-bold text-amber-800 mb-4"><i className="fa-solid fa-bell"></i> 승인 대기중인 일정</h3>
                            <div className="space-y-2">
                                {materials.filter(m => m.status === 'pending').map(m => (
                                    <div key={m.id} className="bg-white p-3 rounded-lg flex justify-between items-center shadow-sm border border-amber-100">
                                        <div className="text-sm"><span className="font-bold text-slate-700">{m.date} [{m.time}]</span> <span className="text-blue-600 font-medium ml-2">{m.subName}</span> - {m.text}</div>
                                        <div className="flex gap-2">
                                            <button onClick={()=>handleApproveMaterial(m.id)} className="bg-emerald-500 text-white text-[10px] px-3 py-1.5 rounded font-bold">승인</button>
                                            <button onClick={()=>handleDeleteMaterial(m.id)} className="bg-rose-500 text-white text-[10px] px-3 py-1.5 rounded font-bold">거절</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {showModal && !isGuest && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl animate-fade-in-down">
                                <h3 className="text-lg font-bold text-slate-800 mb-4">{selectedDateStr} 일정 등록</h3>
                                <form onSubmit={submitMat} className="space-y-4">
                                    <div className="flex gap-2">
                                        <button type="button" onClick={()=>setNewMat({...newMat, time:'오전'})} className={`flex-1 py-2 rounded-lg font-bold text-sm border ${newMat.time==='오전'?'bg-blue-600 text-white border-blue-600':'bg-slate-50 text-slate-500'}`}>오전</button>
                                        <button type="button" onClick={()=>setNewMat({...newMat, time:'오후'})} className={`flex-1 py-2 rounded-lg font-bold text-sm border ${newMat.time==='오후'?'bg-blue-600 text-white border-blue-600':'bg-slate-50 text-slate-500'}`}>오후</button>
                                    </div>
                                    <div><label className="text-xs font-bold text-slate-500">반입 자재 및 내용</label><input className="w-full mt-1 p-3 border rounded-xl text-sm" placeholder="예: 철근 10t 반입" value={newMat.text} onChange={e=>setNewMat({...newMat, text:e.target.value})} required autoFocus/></div>
                                    <div className="flex gap-2 pt-2">
                                        <button type="submit" className="flex-1 bg-slate-800 text-white py-3 rounded-xl font-bold shadow">{isMaster ? '일정 등록' : '등록 요청'}</button>
                                        <button type="button" onClick={()=>setShowModal(false)} className="flex-1 bg-slate-200 text-slate-700 py-3 rounded-xl font-bold">취소</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ChecklistTab = ({ checklists, riskMapping, isGuest, handleAddChecklist, handleToggleChecklist, handleDeleteChecklist }) => {
            const [newCheck, setNewCheck] = useState({ date: getLocalYMD(), trade: Object.keys(riskMapping)[0] || '', location: '', content: '', dueDate: getLocalYMD() });
            const [img, setImg] = useState(null);
            const fileRef = useRef(null);
            const [expandedImage, setExpandedImage] = useState(null);

            const handleImg = (e) => {
                const f = e.target.files[0];
                if (f) {
                    const r = new FileReader();
                    r.onloadend = () => {
                        const imgObj = new Image();
                        imgObj.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = imgObj.width;
                            let height = imgObj.height;
                            const MAX_WIDTH = 800;
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(imgObj, 0, 0, width, height);
                            setImg(canvas.toDataURL('image/jpeg', 0.6));
                        };
                        imgObj.src = r.result;
                    };
                    r.readAsDataURL(f);
                }
            };
            
            const onSubmit = (e) => {
                e.preventDefault();
                if(isGuest) return;
                handleAddChecklist({...newCheck, image: img});
                setNewCheck({ ...newCheck, location: '', content: '' }); setImg(null); if(fileRef.current) fileRef.current.value = '';
            };

            const totalCount = checklists.length;
            const completedCount = checklists.filter(c => c.isCompleted).length;
            const pendingCount = totalCount - completedCount;

            return (
                <div className="space-y-6 animate-fade-in">
                    <TabDescription text="[모바일 안전 점검표] 현장 순회 시 안전 및 품질 점검 사진과 지시사항을 기록하고 완료 여부를 실시간으로 추적 관리합니다." />
                    
                    {!isGuest && (
                        <div className="bg-white rounded-2xl shadow border border-slate-100 p-6">
                            <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800"><i className="fa-solid fa-clipboard-check text-emerald-600"></i> 마스터 체크리스트 등록</h2>
                            <form onSubmit={onSubmit} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500">등록일자</label><input type="date" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50" value={newCheck.date} onChange={e=>setNewCheck({...newCheck, date:e.target.value})} required/></div>
                                <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500">공종</label><select className="w-full p-2.5 border rounded-lg text-sm bg-slate-50" value={newCheck.trade} onChange={e=>setNewCheck({...newCheck, trade:e.target.value})}>{Object.keys(riskMapping).map(t=><option key={t}>{t}</option>)}</select></div>
                                <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500">현장위치</label><input type="text" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50" value={newCheck.location} onChange={e=>setNewCheck({...newCheck, location:e.target.value})} required/></div>
                                <div className="space-y-1"><label className="text-[10px] font-bold text-slate-500">완료 예정일</label><input type="date" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50" value={newCheck.dueDate} onChange={e=>setNewCheck({...newCheck, dueDate:e.target.value})} required/></div>
                                <div className="space-y-1 md:col-span-2 lg:col-span-3"><label className="text-[10px] font-bold text-slate-500">점검 내용</label><input type="text" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50" placeholder="점검 및 지시사항 입력" value={newCheck.content} onChange={e=>setNewCheck({...newCheck, content:e.target.value})} required/></div>
                                <div className="flex gap-2 items-end">
                                    <label className="flex-1 bg-white border border-slate-300 text-slate-600 text-sm font-bold p-2.5 rounded-lg flex justify-center items-center cursor-pointer hover:bg-slate-50 transition"><i className="fa-solid fa-camera mr-2"></i> {img ? '사진 재선택' : '사진 첨부'}<input type="file" className="hidden" accept="image/*" onChange={handleImg} ref={fileRef}/></label>
                                    <button type="submit" className="flex-1 bg-emerald-600 text-white font-bold p-2.5 rounded-lg shadow hover:bg-emerald-700 transition">등록</button>
                                </div>
                            </form>
                            {img && <img src={img} className="h-20 object-cover mt-3 rounded-lg border shadow-sm" alt="preview"/>}
                        </div>
                    )}

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 flex justify-around divide-x divide-slate-100">
                        <div className="text-center w-full">
                            <p className="text-xs font-bold text-slate-500 mb-1">총 점검 건수</p>
                            <p className="text-2xl font-black text-slate-800">{totalCount}</p>
                        </div>
                        <div className="text-center w-full">
                            <p className="text-xs font-bold text-slate-500 mb-1">조치 완료</p>
                            <p className="text-2xl font-black text-emerald-500">{completedCount}</p>
                        </div>
                        <div className="text-center w-full">
                            <p className="text-xs font-bold text-slate-500 mb-1">미조치</p>
                            <p className="text-2xl font-black text-rose-500">{pendingCount}</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {checklists.map((c, idx) => (
                            <div key={c.id} className={`bg-white rounded-xl border p-4 shadow-sm flex gap-4 transition-all ${c.isCompleted ? 'opacity-60 grayscale bg-slate-50' : 'border-slate-200'}`}>
                                {c.image ? <img src={c.image} onClick={() => setExpandedImage(c.image)} className="w-24 h-24 object-cover rounded-lg border cursor-pointer hover:opacity-80 transition" alt="checklist"/> : <div className="w-24 h-24 bg-slate-100 rounded-lg flex items-center justify-center text-slate-300"><i className="fa-solid fa-image text-2xl"></i></div>}
                                <div className="flex-1 relative">
                                    <div className="flex justify-between items-start mb-1">
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs font-black text-slate-400">#{checklists.length - idx}</span>
                                            <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded">{c.trade}</span>
                                        </div>
                                        {!isGuest && (
                                            <div className="flex items-center gap-3">
                                                <button onClick={()=>handleToggleChecklist(c.id, !c.isCompleted)} className={`px-3 py-1 rounded text-xs font-bold transition border ${c.isCompleted ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-slate-400 border-slate-300 hover:border-emerald-500 hover:text-emerald-500'}`}><i className="fa-solid fa-check"></i> 완료 확인</button>
                                                <button onClick={()=>handleDeleteChecklist(c.id)} className="text-slate-300 hover:text-rose-500"><i className="fa-solid fa-xmark"></i></button>
                                            </div>
                                        )}
                                    </div>
                                    <div className="text-xs font-bold text-slate-500 mb-1"><i className="fa-solid fa-location-dot mr-1"></i>{c.location}</div>
                                    <p className="text-sm font-bold text-slate-800 leading-snug">{c.content}</p>
                                    <div className="absolute bottom-0 left-0 flex gap-2 text-[10px] text-slate-400 font-medium">
                                        <span>등록: {c.date}</span><span>|</span><span className={c.isCompleted ? '' : 'text-rose-500 font-bold'}>예정: {c.dueDate}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {checklists.length === 0 && <div className="col-span-1 md:col-span-2 text-center py-10 text-slate-400">등록된 체크리스트가 없습니다.</div>}
                    </div>

                    {expandedImage && (
                        <div className="fixed inset-0 z-50 bg-black/90 flex justify-center items-center p-4 cursor-pointer animate-fade-in" onClick={() => setExpandedImage(null)}>
                            <button className="absolute top-6 right-6 text-white hover:text-rose-500 transition z-50"><i className="fa-solid fa-xmark text-4xl"></i></button>
                            <img src={expandedImage} className="max-w-full max-h-full object-contain rounded-xl shadow-2xl cursor-default" onClick={(e) => e.stopPropagation()} alt="expanded"/>
                        </div>
                    )}
                </div>
            );
        };

        const SettingsTab = ({ passwords, handleUpdatePasswords, savedSubs, handleAddSavedSub, handleUpdateSavedSub, handleDeleteSavedSub, showToast, isGuest }) => {
            const [localPasswords, setLocalPasswords] = useState(passwords);
            const [newSubName, setNewSubName] = useState('');
            const [newSubPw, setNewSubPw] = useState('');
            const [editSubId, setEditSubId] = useState(null);
            const [editSubData, setEditSubData] = useState({ name: '', password: '' });
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);

            const onSubmitGlobal = (e) => { e.preventDefault(); if(!isGuest) handleUpdatePasswords(localPasswords); };
            const onAddSub = (e) => {
                e.preventDefault();
                if(isGuest) return;
                if(!newSubName.trim() || !newSubPw.trim()) return showToast('협력사명과 비밀번호를 모두 입력하세요.');
                if(savedSubs.some(s => s.name === newSubName)) return showToast('이미 존재하는 협력사입니다.');
                handleAddSavedSub({ name: newSubName.trim(), password: newSubPw.trim(), manager: '', phone: '' });
                setNewSubName(''); setNewSubPw('');
            };

            const startEdit = (sub) => {
                if(isGuest) return;
                setEditSubId(sub.id); setEditSubData({ name: sub.name, password: sub.password || 'sub1234' }); setDeleteConfirmId(null);
            };
            const saveEdit = () => {
                if(isGuest) return;
                if(!editSubData.name.trim() || !editSubData.password.trim()) return showToast('값을 모두 입력해주세요.');
                handleUpdateSavedSub(editSubId, editSubData); setEditSubId(null);
            };

            return (
                <div className="space-y-6 animate-fade-in grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                    <div className="lg:col-span-2"><TabDescription text="[시스템 설정] 공통 비밀번호 변경 및 새로운 협력사 계정을 추가/관리할 수 있는 최고 관리자용 설정 페이지입니다." /></div>
                    
                    <div className="bg-white rounded-2xl shadow border border-slate-100 p-6 md:p-8">
                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2"><i className="fa-solid fa-lock text-slate-800"></i> 공통 관리자 비밀번호</h2>
                        <form onSubmit={onSubmitGlobal} className="space-y-4">
                            {Object.keys(localPasswords).filter(r => r !== '협력사 소장/관리자' && r !== '게스트 (조회 전용)').map(role => (
                                <div key={role} className="space-y-2">
                                    <label className="text-xs font-bold text-slate-600">{role} 접속 비밀번호</label>
                                    <input type="text" className="w-full p-3 border border-slate-200 rounded-xl text-sm bg-slate-50 font-bold text-blue-600 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition" value={localPasswords[role]} onChange={e => setLocalPasswords({...localPasswords, [role]: e.target.value})} disabled={isGuest} required />
                                </div>
                            ))}
                            {!isGuest && (
                                <div className="pt-4">
                                    <button type="submit" className="bg-slate-800 hover:bg-black transition text-white px-8 py-3 rounded-xl font-bold shadow w-full"><i className="fa-solid fa-floppy-disk mr-2"></i>비밀번호 변경 저장</button>
                                </div>
                            )}
                        </form>
                    </div>

                    <div className="bg-white rounded-2xl shadow border border-slate-100 p-6 md:p-8">
                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2"><i className="fa-solid fa-users-gear text-slate-800"></i> 협력사 등록 및 개별 비밀번호</h2>
                        {!isGuest && (
                            <form onSubmit={onAddSub} className="flex flex-col sm:flex-row gap-2 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <input type="text" placeholder="협력사명" className="flex-1 p-2.5 border rounded-lg text-sm font-bold bg-white outline-none focus:border-blue-500" value={newSubName} onChange={e=>setNewSubName(e.target.value)} required />
                                <input type="text" placeholder="초기 접속 PW" className="w-32 p-2.5 border rounded-lg text-sm font-bold bg-white outline-none focus:border-blue-500" value={newSubPw} onChange={e=>setNewSubPw(e.target.value)} required />
                                <button type="submit" className="bg-blue-600 text-white px-4 py-2.5 rounded-lg font-bold shadow hover:bg-blue-700 transition whitespace-nowrap"><i className="fa-solid fa-plus"></i> 추가</button>
                            </form>
                        )}

                        <div className="space-y-2 max-h-[400px] overflow-y-auto pr-2">
                            {savedSubs.map(sub => {
                                const isEditing = editSubId === sub.id;
                                const isConfirmDelete = deleteConfirmId === sub.id;

                                return (
                                <div key={sub.id} className="flex flex-col sm:flex-row sm:items-center justify-between p-3 bg-white border border-slate-200 rounded-xl hover:border-blue-300 transition gap-2">
                                    {isEditing ? (
                                        <>
                                            <input type="text" className="flex-1 p-2 border rounded text-sm font-bold bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-blue-100" value={editSubData.name} onChange={e=>setEditSubData({...editSubData, name: e.target.value})} placeholder="협력사명" />
                                            <input type="text" className="w-full sm:w-28 p-2 border rounded text-sm font-bold bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-blue-100" value={editSubData.password} onChange={e=>setEditSubData({...editSubData, password: e.target.value})} placeholder="비밀번호" />
                                            <div className="flex gap-1">
                                                <button onClick={saveEdit} className="text-xs bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded font-bold shadow transition">저장</button>
                                                <button onClick={() => setEditSubId(null)} className="text-xs bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-2 rounded font-bold transition">취소</button>
                                            </div>
                                        </>
                                    ) : (
                                        <>
                                            <span className="font-bold text-slate-700 text-sm">{sub.name}</span>
                                            <div className="flex items-center gap-2">
                                                <div className="bg-slate-50 px-3 py-1.5 rounded-lg border text-xs font-bold text-slate-500">PW: <span className="text-blue-600">{sub.password || 'sub1234'}</span></div>
                                                {!isGuest && (
                                                    isConfirmDelete ? (
                                                        <div className="flex gap-1 items-center bg-rose-50 p-1 rounded-lg border border-rose-100">
                                                            <span className="text-[10px] text-rose-600 font-bold px-1">진짜 삭제?</span>
                                                            <button onClick={() => { handleDeleteSavedSub(sub.id); setDeleteConfirmId(null); }} className="text-xs bg-rose-500 hover:bg-rose-600 text-white px-2 py-1 rounded font-bold transition">확인</button>
                                                            <button onClick={() => setDeleteConfirmId(null)} className="text-xs bg-white border border-slate-300 text-slate-700 px-2 py-1 rounded font-bold transition">취소</button>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            <button onClick={() => startEdit(sub)} className="text-xs bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1.5 rounded font-bold transition">수정</button>
                                                            <button onClick={() => setDeleteConfirmId(sub.id)} className="text-xs bg-rose-100 hover:bg-rose-200 text-rose-600 px-2 py-1.5 rounded font-bold transition"><i className="fa-solid fa-trash-can"></i></button>
                                                        </>
                                                    )
                                                )}
                                            </div>
                                        </>
                                    )}
                                </div>
                            )})}
                            {savedSubs.length === 0 && <div className="text-center py-6 text-slate-400 text-sm">등록된 협력사가 없습니다.</div>}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 메인 App 컴포넌트
        // ==========================================
        function App() {
            const INITIAL_RISK_MAPPING = {
                '가설공사': '추락(안전대 미체결), 자재 낙하', '토공사': '중장비 충돌/협착, 토사 붕괴', '철근콘크리트': '개구부 추락, 펌프카 타격', '철골공사': '고소작업 추락, 화재', '조적/미장/방수': '밀폐공간 질식', '전기/설비': '활선작업 감전', '기타': '자재 찔림/베임'
            };
            const INITIAL_PASSWORDS = { '원청 관리자 (Master)': 'admin1234', '감리단 / 발주처': 'sup1234' };

            const todayStr = getLocalYMD();

            const [user, setUser] = useState(null);
            const [isEntered, setIsEntered] = useState(false);
            const [loginRole, setLoginRole] = useState('원청 관리자 (Master)');
            const [myCompany, setMyCompany] = useState('');
            const [loginPwd, setLoginPwd] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [hasNewNotification, setHasNewNotification] = useState(false);
            const [toasts, setToasts] = useState([]);
            
            const [savedSubs, setSavedSubs] = useState([]);
            const [subcontractors, setSubcontractors] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [materials, setMaterials] = useState([]);
            const [checklists, setChecklists] = useState([]);
            const [requests, setRequests] = useState([]);
            const [dailyReports, setDailyReports] = useState([]);
            const [riskMapping, setRiskMapping] = useState(INITIAL_RISK_MAPPING);
            const [passwords, setPasswords] = useState(INITIAL_PASSWORDS);

            const isMaster = loginRole === '원청 관리자 (Master)';
            const isGuest = loginRole === '게스트 (조회 전용)';

            const displaySavedSubs = isGuest ? [] : savedSubs;
            const displaySubcontractors = isGuest ? [] : subcontractors;
            const displayTasks = isGuest ? [] : tasks;
            const displayMaterials = isGuest ? [] : materials;
            const displayChecklists = isGuest ? [] : checklists;
            const displayRequests = isGuest ? [] : requests;
            const displayDailyReports = isGuest ? [] : dailyReports;
            const displayPasswords = isGuest ? Object.keys(passwords).reduce((acc, key) => ({ ...acc, [key]: '' }), {}) : passwords;

            const formatTs = (ts) => {
                const d = new Date(ts);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            };

            const stats = useMemo(() => {
                let totalAssigned=0, currentWorking=0, totalElderly=0, totalNew=0, totalForeigner=0, totalFemale=0;
                
                if (isGuest) return { totalAssigned, currentWorking, totalElderly, totalNew, totalForeigner, totalFemale };

                const todaysSubs = subcontractors.filter(sub => (sub.date || formatTs(sub.createdAt)) === todayStr);
                
                todaysSubs.forEach(sub => {
                    const assigned = (sub.early||0) + (sub.day||0) + (sub.night||0);
                    totalAssigned += assigned;
                    let working = 0;
                    if (sub.early > 0 && !sub.clockedOut?.early) working += sub.early;
                    if (sub.day > 0 && !sub.clockedOut?.day) working += sub.day;
                    if (sub.night > 0 && !sub.clockedOut?.night) working += sub.night;
                    currentWorking += working;
                    totalElderly += (sub.elderly||0); totalNew += (sub.new||0); totalForeigner += (sub.foreigner||0); totalFemale += (sub.female||0);
                });
                return { totalAssigned, currentWorking, totalElderly, totalNew, totalForeigner, totalFemale };
            }, [subcontractors, todayStr, isGuest]);

            const dummyWeather = {
                today: { icon: <i className="fa-solid fa-sun text-rose-500 text-3xl"></i>, desc: '맑음', temp: '22℃' },
                tomorrow: { icon: <i className="fa-solid fa-cloud text-slate-400 text-3xl"></i>, desc: '구름많음', temp: '19℃' }
            };

            const showToast = (message) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try { await signInWithCustomToken(auth, __initial_auth_token); } catch(e) { await signInAnonymously(auth); }
                    } else { await signInAnonymously(auth); }
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const getPublicCol = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);

                const unsubSavedSubs = onSnapshot(getPublicCol('saved_subs'), snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    if (data.length === 0) {
                        ['(주)제일건설', '대지토건(주)'].forEach((name, i) => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'saved_subs', String(i)), {name, manager:'', phone:'', password: 'sub1234'}));
                    } else setSavedSubs(data);
                }, e => console.error(e));

                const unsubSubs = onSnapshot(getPublicCol('subcontractors'), snap => setSubcontractors(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.createdAt-a.createdAt)), e=>console.error(e));
                const unsubTasks = onSnapshot(getPublicCol('tasks'), snap => setTasks(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.createdAt-a.createdAt)), e=>console.error(e));
                const unsubMats = onSnapshot(getPublicCol('materials'), snap => setMaterials(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.createdAt-a.createdAt)), e=>console.error(e));
                const unsubChecks = onSnapshot(getPublicCol('checklists'), snap => setChecklists(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.createdAt-a.createdAt)), e=>console.error(e));
                const unsubReqs = onSnapshot(getPublicCol('requests'), snap => { setRequests(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.createdAt-a.createdAt)); setHasNewNotification(true); }, e=>console.error(e));
                const unsubDailyReports = onSnapshot(getPublicCol('daily_reports'), snap => setDailyReports(snap.docs.map(d => ({id: d.id, ...d.data()}))), e => console.error(e));
                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), snap => {
                    if (snap.exists()) {
                        const d = snap.data(); if(d.riskMapping) setRiskMapping(d.riskMapping); if(d.passwords) setPasswords(d.passwords);
                    } else setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { riskMapping: INITIAL_RISK_MAPPING, passwords: INITIAL_PASSWORDS });
                }, e=>console.error(e));

                return () => { unsubSavedSubs(); unsubSubs(); unsubTasks(); unsubMats(); unsubChecks(); unsubReqs(); unsubDailyReports(); unsubSettings(); };
            }, [user]);

            const getDocRef = (col, docId) => doc(db, 'artifacts', appId, 'public', 'data', col, String(docId));

            const handleLogin = () => {
                if (loginRole === '게스트 (조회 전용)') {
                    setIsEntered(true);
                    return;
                }
                
                if (loginRole === '협력사 소장/관리자') {
                    if (!myCompany) return alert('소속 협력사를 선택해주세요.');
                    const subData = savedSubs.find(s => s.name === myCompany);
                    if (!subData) return alert('등록되지 않은 협력사입니다.');
                    if (loginPwd !== (subData.password || 'sub1234')) return alert('비밀번호가 일치하지 않습니다.');
                } else {
                    if (loginPwd !== passwords[loginRole]) return alert('비밀번호가 일치하지 않습니다.');
                }
                setIsEntered(true);
            };

            const handleAddSubToDB = async (data) => {
                if(!user) return;
                if(isGuest) return showToast('게스트 모드에서는 작성/수정 권한이 없습니다.');
                await setDoc(getDocRef('subcontractors', Date.now().toString()), { ...data, status: isMaster ? 'approved' : 'pending', clockedOut: {}, createdAt: Date.now() });
                showToast(isMaster ? '출역이 등록되었습니다.' : '출역 승인 요청이 전송되었습니다.');
            };
            const handleUpdateSubToDB = async (id, data, masterFlag) => {
                if(!user) return;
                if(isGuest) return showToast('게스트 모드에서는 작성/수정 권한이 없습니다.');
                if(masterFlag) {
                    await updateDoc(getDocRef('subcontractors', id), { ...data, status: 'approved', pendingData: null });
                    showToast('수정이 완료되었습니다.');
                } else {
                    await updateDoc(getDocRef('subcontractors', id), { status: 'pending_update', pendingData: data }); 
                    showToast('수정 요청이 전송되었습니다. (원청 승인 대기)');
                }
            };
            const handleApproveSubUpdate = async (id, pendingData) => { if(!user) return; if(isGuest) return showToast('권한이 없습니다.'); await updateDoc(getDocRef('subcontractors', id), { ...pendingData, status: 'approved', pendingData: null }); };
            const handleRejectSubUpdate = async (id) => { if(!user) return; if(isGuest) return showToast('권한이 없습니다.'); await updateDoc(getDocRef('subcontractors', id), { status: 'approved', pendingData: null }); };
            const handleClockOut = async (id, shift, name) => { if(!user || !confirm(`${name} 퇴근?`)) return; if(isGuest) return showToast('권한이 없습니다.'); await updateDoc(getDocRef('subcontractors', id), { [`clockedOut.${shift}`]: true }); };

            const handleAddTaskToDB = async (data) => {
                if(!user) return;
                if(isGuest) return showToast('게스트 모드에서는 작성/수정 권한이 없습니다.');
                await setDoc(getDocRef('tasks', Date.now().toString()), { ...data, status: isMaster ? 'approved' : 'pending', createdAt: Date.now() });
                showToast(isMaster ? '작업이 등록되었습니다.' : '작업 승인 요청이 전송되었습니다.');
            };
            const handleUpdateTaskToDB = async (id, data, masterFlag) => {
                if(!user) return;
                if(isGuest) return showToast('게스트 모드에서는 작성/수정 권한이 없습니다.');
                if(masterFlag) {
                    await updateDoc(getDocRef('tasks', id), { ...data, status: 'approved', pendingData: null });
                    showToast('작업 수정이 완료되었습니다.');
                } else {
                    await updateDoc(getDocRef('tasks', id), { status: 'pending_update', pendingData: data }); 
                    showToast('작업 수정이 요청되었습니다.');
                }
            };
            const handleApproveTaskUpdate = async (id, pendingData) => { if(!user) return; if(isGuest) return showToast('권한이 없습니다.'); await updateDoc(getDocRef('tasks', id), { ...pendingData, status: 'approved', pendingData: null }); };
            const handleRejectTaskUpdate = async (id) => { if(!user) return; if(isGuest) return showToast('권한이 없습니다.'); await updateDoc(getDocRef('tasks', id), { status: 'approved', pendingData: null }); };

            const handleSaveDailyReport = async (dateStr, data) => {
                if(!user) return;
                if(isGuest) return showToast('게스트 모드에서는 저장 권한이 없습니다.');
                await setDoc(getDocRef('daily_reports', dateStr), { entries: data, updatedAt: Date.now() });
                showToast(`${dateStr.slice(5)} 기준 출역일보가 보존처리 되었습니다.`);
            };
            const handleDeleteDailyReport = async (dateStr) => {
                if(!user) return;
                if(isGuest) return showToast('권한이 없습니다.');
                await deleteDoc(getDocRef('daily_reports', dateStr));
                showToast('최신 데이터로 덮어쓰기 완료했습니다.');
            };

            const handleAddMaterial = async (data) => {
                if(!user) return;
                if(isGuest) return showToast('게스트 권한이 없습니다.');
                await setDoc(getDocRef('materials', Date.now().toString()), { ...data, status: isMaster ? 'approved' : 'pending', createdAt: Date.now() }); 
                showToast(isMaster ? '일정이 등록되었습니다.' : '자재 반입 일정이 요청되었습니다.');
            };
            const handleApproveMaterial = async (id) => { if(!user) return; if(isGuest) return showToast('권한이 없습니다.'); await updateDoc(getDocRef('materials', id), { status: 'approved' }); };
            const handleDeleteMaterial = async (id) => { if(!user || !confirm('삭제하시겠습니까?')) return; if(isGuest) return showToast('권한이 없습니다.'); await deleteDoc(getDocRef('materials', id)); };

            const handleAddChecklist = async (data) => {
                if(!user) return;
                if(isGuest) return showToast('게스트 권한이 없습니다.');
                try { await setDoc(getDocRef('checklists', Date.now().toString()), { ...data, isCompleted: false, createdAt: Date.now() }); } catch(e) { alert('사진 용량이 너무 큽니다.'); }
            };
            const handleToggleChecklist = async (id, isCompleted) => { if(!user) return; if(isGuest) return showToast('권한이 없습니다.'); await updateDoc(getDocRef('checklists', id), { isCompleted }); };
            const handleDeleteChecklist = async (id) => { if(!user || !confirm('삭제하시겠습니까?')) return; if(isGuest) return showToast('권한이 없습니다.'); await deleteDoc(getDocRef('checklists', id)); };

            const handleUpdatePasswords = async (newPasswords) => { if(!user) return; if(isGuest) return showToast('게스트 권한이 없습니다.'); await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { passwords: newPasswords }); showToast('비밀번호가 변경되었습니다.'); };
            const handleAddSavedSubToDB = async (data) => { if(!user) return; if(isGuest) return showToast('게스트 권한이 없습니다.'); await setDoc(getDocRef('saved_subs', Date.now().toString()), { ...data, createdAt: Date.now() }); showToast('협력사가 등록되었습니다.'); };
            const handleUpdateSavedSubToDB = async (id, data) => { if(!user) return; if(isGuest) return showToast('게스트 권한이 없습니다.'); await updateDoc(getDocRef('saved_subs', id), data); showToast('협력사 정보가 업데이트되었습니다.'); };
            const handleDeleteSavedSubFromDB = async (id) => { if(!user) return; if(isGuest) return showToast('권한이 없습니다.'); await deleteDoc(getDocRef('saved_subs', id)); showToast('협력사가 삭제되었습니다.'); };

            const handleAddRequestToDB = async (newReq, img, currentRole) => {
                if(!user || !db) return;
                if(isGuest) return showToast('게스트 권한이 없습니다.');
                try {
                    const newId = Date.now().toString();
                    await setDoc(getDocRef('requests', newId), {
                        sender: `${currentRole.split(' ')[0]} (나)`, type: newReq.type, content: newReq.content, image: img,
                        time: new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' }), status: '대기', createdAt: Date.now()
                    });
                    showToast('메시지가 전송되었습니다.');
                } catch(e) { alert('사진 용량이 너무 큽니다.'); }
            };
            const deleteRequest = async (id) => { if(!user) return; if(isGuest) return showToast('권한이 없습니다.'); await deleteDoc(getDocRef('requests', id)); };

            const todayDateString = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

            if (!isEntered) {
                return (
                    <div className="min-h-screen bg-slate-900 flex justify-center items-center p-4">
                        <div className="bg-white rounded-3xl p-10 max-w-md w-full animate-fade-in-down border border-slate-100">
                            <div className="flex justify-center mb-6"><div className="bg-blue-600 p-5 rounded-3xl shadow-lg"><i className="fa-solid fa-helmet-safety text-5xl text-white"></i></div></div>
                            <h1 className="text-2xl font-bold text-center text-slate-800 mb-10 tracking-tight">동작 프리센트 현장관리</h1>
                            <div className="space-y-4 mb-8">
                                <div>
                                    <label className="block text-[10px] font-black text-slate-400 mb-1 uppercase">Access Role</label>
                                    <select className="w-full p-4 border rounded-xl text-sm font-bold bg-slate-50 outline-none focus:ring-2 focus:ring-blue-400" value={loginRole} onChange={e => {setLoginRole(e.target.value); setMyCompany('');}}>
                                        <option>원청 관리자 (Master)</option>
                                        <option>협력사 소장/관리자</option>
                                        <option>감리단 / 발주처</option>
                                        <option>게스트 (조회 전용)</option>
                                    </select>
                                </div>
                                {loginRole === '협력사 소장/관리자' && (
                                    <div className="animate-fade-in">
                                        <label className="block text-[10px] font-black text-rose-500 mb-1 uppercase">Select Your Company (권한 식별용)</label>
                                        <select className="w-full p-4 border border-rose-200 rounded-xl text-sm font-bold bg-rose-50 outline-none focus:ring-2 focus:ring-rose-500" value={myCompany} onChange={e => setMyCompany(e.target.value)}>
                                            <option value="" disabled>소속 협력사를 선택해주세요</option>
                                            {savedSubs.map((s,i) => <option key={i} value={s.name}>{s.name}</option>)}
                                        </select>
                                    </div>
                                )}
                                {loginRole !== '게스트 (조회 전용)' && (
                                    <div className="animate-fade-in">
                                        <label className="block text-[10px] font-black text-slate-400 mb-1 uppercase">Passcode</label>
                                        <input type="password" placeholder="········" className="w-full p-4 border rounded-xl text-sm bg-slate-50 font-black outline-none focus:ring-2 focus:ring-blue-400" value={loginPwd} onChange={e => setLoginPwd(e.target.value)} onKeyDown={e => e.key==='Enter' && handleLogin()}/>
                                    </div>
                                )}
                            </div>
                            <button onClick={handleLogin} className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-black transition shadow-lg">시스템 접속 <i className="fa-solid fa-arrow-right ml-2"></i></button>
                            {loginRole === '게스트 (조회 전용)' && <p className="text-[10px] text-slate-400 text-center mt-3 font-bold">비밀번호 없이 모든 탭의 내용을 열람할 수 있습니다.</p>}
                        </div>
                    </div>
                );
            }

            if (!user) return <div className="min-h-screen bg-slate-900 flex justify-center items-center"><i className="fa-solid fa-spinner fa-spin text-white text-3xl"></i></div>;

            return (
                <div className="min-h-screen font-sans text-slate-900 pb-20 relative">
                    {isGuest && <div className="fixed top-20 right-0 bg-amber-500 text-white text-[10px] font-bold px-3 py-1 rounded-l-full shadow-lg z-50">게스트 조회 모드</div>}
                    <div className="fixed top-4 right-4 z-50 space-y-2">{toasts.map(t => (<div key={t.id} className="bg-slate-800 text-white px-5 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-fade-in-down border border-slate-700"><i className="fa-solid fa-circle-check text-emerald-400"></i><p className="text-sm font-bold">{t.message}</p></div>))}</div>
                    <nav className="bg-slate-900 text-white sticky top-0 z-40 shadow-xl">
                        <div className="max-w-7xl mx-auto px-6 flex items-center justify-between h-16">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-lg"><i className="fa-solid fa-helmet-safety"></i></div>
                                <h1 className="font-bold tracking-tight text-lg">동작 프리센트</h1>
                            </div>
                            <div className="flex items-center gap-4 text-sm">
                                <button onClick={() => setHasNewNotification(false)} className="relative p-2 text-slate-400 hover:text-white transition" title="알림 확인"><i className="fa-solid fa-bell text-xl"></i>{hasNewNotification && <span className="absolute top-2 right-1.5 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-slate-900 animate-pulse"></span>}</button>
                                <span className="hidden sm:inline bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold text-blue-300">{loginRole.split(' ')[0]} {myCompany && `(${myCompany})`}</span>
                                <button onClick={()=>setIsEntered(false)} className="text-slate-400 hover:text-white"><i className="fa-solid fa-power-off"></i></button>
                            </div>
                        </div>
                        <div className="border-t border-white/10">
                            <div className="max-w-7xl mx-auto px-6 flex overflow-x-auto hide-scrollbar">
                                {[
                                    { id: 'dashboard', icon: 'fa-house', label: '홈' },
                                    { id: 'attendance', icon: 'fa-users', label: '출역' },
                                    { id: 'dailyReport', icon: 'fa-file-lines', label: '출역일보', masterOnly: true },
                                    { id: 'tasks', icon: 'fa-list-check', label: '작업/위험' },
                                    { id: 'materials', icon: 'fa-calendar-check', label: '자재반입' },
                                    { id: 'requests', icon: 'fa-comment-dots', label: '소통' },
                                    { id: 'checklists', icon: 'fa-clipboard-check', label: '체크리스트', masterOnly: true },
                                    { id: 'settings', icon: 'fa-gear', label: '설정', masterOnly: true }
                                ].map(t => (!t.masterOnly || isMaster || isGuest) && (
                                    <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`px-5 py-3 text-xs font-bold whitespace-nowrap border-b-2 transition flex items-center gap-1.5 ${activeTab===t.id ? 'border-blue-500 text-white bg-white/5' : 'border-transparent text-slate-400 hover:text-slate-200'}`}>
                                        <i className={`fa-solid ${t.icon}`}></i> {t.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
                        {activeTab === 'dashboard' && <DashboardTab stats={stats} realWeather={dummyWeather} tasks={displayTasks.filter(t => (t.date || formatTs(t.createdAt)) === todayStr)} requests={displayRequests} todayDateString={todayDateString} formatMd={(d)=>`${d.getMonth()+1}월 ${d.getDate()}일`} todayDate={new Date()} tomorrowDate={new Date(new Date().setDate(new Date().getDate()+1))} setActiveTab={setActiveTab} />}
                        {activeTab === 'attendance' && <AttendanceTab subcontractors={displaySubcontractors} savedSubs={displaySavedSubs} riskMapping={riskMapping} stats={stats} loginRole={loginRole} isMaster={isMaster} isGuest={isGuest} myCompany={myCompany} handleAddSubToDB={handleAddSubToDB} handleUpdateSubToDB={handleUpdateSubToDB} handleApproveSubUpdate={handleApproveSubUpdate} handleRejectSubUpdate={handleRejectSubUpdate} deleteSubcontractor={(id)=> {if(user && confirm('삭제?')) deleteDoc(getDocRef('subcontractors',id))}} handleUpdateRiskMapping={async (k,v)=>{if(isGuest)return; const nm={...riskMapping}; if(v===null) delete nm[k]; else nm[k]=v; await updateDoc(doc(db,'artifacts',appId,'public','data','settings','global'), {riskMapping:nm});}} handleClockOut={handleClockOut} todayStr={todayStr} />}
                        {activeTab === 'dailyReport' && (isMaster || isGuest) && <DailyReportTab subcontractors={displaySubcontractors} tasks={displayTasks} dailyReports={displayDailyReports} todayStr={todayStr} isGuest={isGuest} handleSaveDailyReport={handleSaveDailyReport} handleDeleteDailyReport={handleDeleteDailyReport} />}
                        {activeTab === 'tasks' && <TasksTab tasks={displayTasks} riskMapping={riskMapping} savedSubs={displaySavedSubs} isMaster={isMaster} isGuest={isGuest} myCompany={myCompany} todayStr={todayStr} handleAddTaskToDB={handleAddTaskToDB} handleUpdateTaskToDB={handleUpdateTaskToDB} handleApproveTaskUpdate={handleApproveTaskUpdate} handleRejectTaskUpdate={handleRejectTaskUpdate} deleteTask={(id)=>{if(confirm('삭제?')) deleteDoc(getDocRef('tasks',id))}}/>}
                        {activeTab === 'materials' && <MaterialTab materials={displayMaterials} isMaster={isMaster} isGuest={isGuest} myCompany={myCompany} handleAddMaterial={handleAddMaterial} handleApproveMaterial={handleApproveMaterial} handleDeleteMaterial={handleDeleteMaterial}/>}
                        {activeTab === 'requests' && <CommunicationTab requests={displayRequests} loginRole={loginRole} canDelete={isMaster} isGuest={isGuest} handleAddRequestToDB={handleAddRequestToDB} deleteRequest={deleteRequest} />}
                        {activeTab === 'checklists' && (isMaster || isGuest) && <ChecklistTab checklists={displayChecklists} riskMapping={riskMapping} isGuest={isGuest} handleAddChecklist={handleAddChecklist} handleToggleChecklist={handleToggleChecklist} handleDeleteChecklist={handleDeleteChecklist}/>}
                        {activeTab === 'settings' && (isMaster || isGuest) && <SettingsTab passwords={displayPasswords} handleUpdatePasswords={handleUpdatePasswords} savedSubs={displaySavedSubs} isGuest={isGuest} handleAddSavedSub={handleAddSavedSubToDB} handleUpdateSavedSub={handleUpdateSavedSubToDB} handleDeleteSavedSub={handleDeleteSavedSubFromDB} showToast={showToast} />}
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-3 flex justify-around md:hidden z-30 shadow-2xl pb-safe">
                        <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 transition ${activeTab==='dashboard'?'text-blue-600 scale-110':'text-slate-400'}`}><i className="fa-solid fa-house"></i><span className="text-[9px] font-bold">홈</span></button>
                        <button onClick={()=>setActiveTab('attendance')} className={`flex flex-col items-center gap-1 transition ${activeTab==='attendance'?'text-blue-600 scale-110':'text-slate-400'}`}><i className="fa-solid fa-users"></i><span className="text-[9px] font-bold">출역</span></button>
                        <button onClick={()=>setActiveTab('tasks')} className={`flex flex-col items-center gap-1 transition ${activeTab==='tasks'?'text-blue-600 scale-110':'text-slate-400'}`}><i className="fa-solid fa-list-check"></i><span className="text-[9px] font-bold">작업</span></button>
                        <button onClick={()=>setActiveTab('requests')} className={`flex flex-col items-center gap-1 transition ${activeTab==='requests'?'text-blue-600 scale-110':'text-slate-400'}`}><i className="fa-solid fa-comments"></i><span className="text-[9px] font-bold">소통</span></button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
